name: Bump version

# Runs after every merge to main (i.e. every merged PR).
# Reads the current patch number from version.js, increments it by 1,
# writes it back, and commits the change with [skip ci] so this workflow
# does not re-trigger itself.
on:
  push:
    branches:
      - main
    paths-ignore:
      # Don't re-trigger if only version.js changed (the auto-commit itself).
      - 'version.js'

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch with a token that has write permission so the push succeeds.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and bump version
        id: bump
        run: |
          current=$(grep -oP "(?<=APP_VERSION = ')[^']+" version.js)
          echo "Current version: $current"

          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"

          echo "New version: $new_version"
          sed -i "s/APP_VERSION = '$current'/APP_VERSION = '$new_version'/" version.js

          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.js
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
