<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1a1a1a">
  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="700" fill="#f7f5f0"/>
  <rect x="40" y="40" width="720" height="620" rx="12" fill="#fff" stroke="#e6e1d6"/>

  <!-- Modal title -->
  <text x="64" y="76" font-size="16" font-weight="600">Preferences — Sync, backup &amp; data</text>
  <text x="64" y="96" fill="#6b6258" font-size="12">Keep your work safe across devices.</text>
  <line x1="64" y1="112" x2="736" y2="112" stroke="#e6e1d6"/>

  <!-- Section: Folder -->
  <text x="64" y="140" font-weight="600" font-size="13">Folder</text>
  <rect x="64" y="152" width="672" height="120" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
  <text x="80" y="174">Sync folder</text>
  <text x="80" y="192" fill="#6b6258" font-size="12">~/Dropbox/cross-stitch</text>
  <rect x="540" y="160" width="80" height="28" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="556" y="178" font-size="12">Change…</text>
  <rect x="628" y="160" width="92" height="28" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="640" y="178" font-size="12">Disconnect</text>

  <text x="80" y="220">Device name</text>
  <rect x="200" y="206" width="280" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
  <text x="208" y="222" font-size="12" fill="#1a1a1a">MacBook Pro</text>

  <text x="80" y="252" fill="#3a7a3a" font-weight="600" font-size="12">● Synced 2 minutes ago</text>
  <text x="220" y="252" fill="#6b6258" font-size="12">— 4 projects, 24 threads, 2 devices</text>

  <!-- Section: What to sync -->
  <text x="64" y="296" font-weight="600">What to sync</text>
  <rect x="64" y="308" width="672" height="148" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
  <g font-size="12">
    <rect x="80" y="324" width="14" height="14" rx="2" fill="#3a7a3a"/>
    <text x="98" y="335" fill="#fff" font-size="10">✓</text>
    <text x="104" y="335">Project charts</text>
    <text x="320" y="335" fill="#6b6258">7 projects</text>

    <rect x="80" y="350" width="14" height="14" rx="2" fill="#3a7a3a"/>
    <text x="104" y="361">Stitch progress</text>
    <text x="320" y="361" fill="#6b6258">union — never undone by sync</text>

    <rect x="80" y="376" width="14" height="14" rx="2" fill="#3a7a3a"/>
    <text x="104" y="387">Stash &amp; shopping list</text>
    <text x="320" y="387" fill="#6b6258">24 threads owned, 3 patterns</text>

    <rect x="80" y="402" width="14" height="14" rx="2" fill="#fff" stroke="#cfc8b9"/>
    <text x="104" y="413">User preferences</text>
    <text x="320" y="413" fill="#6b6258">theme, units, etc. (off by default)</text>

    <rect x="80" y="428" width="14" height="14" rx="2" fill="#3a7a3a"/>
    <text x="104" y="439">Custom palettes</text>
  </g>

  <!-- Section: Behaviour -->
  <text x="64" y="480" font-weight="600">Behaviour</text>
  <rect x="64" y="492" width="672" height="120" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
  <g font-size="12">
    <text x="80" y="514">Automatic sync</text>
    <rect x="640" y="503" width="44" height="22" rx="11" fill="#3a7a3a"/>
    <circle cx="676" cy="514" r="9" fill="#fff"/>

    <text x="80" y="546">When changes arrive</text>
    <rect x="380" y="532" width="340" height="26" rx="4" fill="#fff" stroke="#cfc8b9"/>
    <text x="392" y="549" font-size="12">Auto-merge safe / ask on conflict ▾</text>

    <text x="80" y="582">Check for updates every</text>
    <rect x="380" y="568" width="120" height="26" rx="4" fill="#fff" stroke="#cfc8b9"/>
    <text x="392" y="585" font-size="12">60 s ▾</text>
  </g>

  <text x="64" y="640" fill="#6b6258" font-size="11">▸ Advanced (first-connection behaviour, activity log, reset device id…)</text>
</svg>
