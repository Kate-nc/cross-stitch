<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1a1a1a">
  <rect width="800" height="540" fill="#f7f5f0"/>
  <rect x="40" y="40" width="720" height="460" rx="12" fill="#fff" stroke="#e6e1d6"/>

  <text x="64" y="76" font-size="16" font-weight="600">Preferences — Sync, backup &amp; data</text>
  <text x="64" y="96" fill="#6b6258" font-size="12">Sync your patterns, progress and stash across devices via your cloud drive.</text>
  <line x1="64" y1="112" x2="736" y2="112" stroke="#e6e1d6"/>

  <!-- Cold-start hero -->
  <rect x="64" y="140" width="672" height="220" rx="10" fill="#fafaf6" stroke="#e6e1d6"/>
  <circle cx="400" cy="190" r="22" fill="none" stroke="#6b6258" stroke-width="1.6"/>
  <path d="M388 190 a12 12 0 0 1 24 0" fill="none" stroke="#6b6258" stroke-width="1.6"/>
  <text x="400" y="240" text-anchor="middle" font-weight="600" font-size="14">Sync isn't set up yet</text>
  <text x="400" y="262" text-anchor="middle" fill="#6b6258" font-size="12">Pick a folder inside Dropbox, Google Drive, OneDrive or iCloud Drive.</text>
  <text x="400" y="280" text-anchor="middle" fill="#6b6258" font-size="12">Your cloud will share it across devices — the app reads &amp; writes there.</text>
  <rect x="320" y="304" width="160" height="36" rx="6" fill="#3a7a3a"/>
  <text x="400" y="328" text-anchor="middle" fill="#fff" font-weight="600">Choose sync folder…</text>
  <text x="400" y="356" text-anchor="middle" fill="#6b6258" font-size="11">Your data stays on your computer. Nothing is sent to our servers.</text>

  <!-- Existing backup section preserved -->
  <text x="64" y="394" font-weight="600">Backup (manual)</text>
  <rect x="64" y="406" width="672" height="76" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
  <text x="80" y="428">Download a backup</text>
  <text x="80" y="446" fill="#6b6258" font-size="12">A .json file with every pattern, your stash and your settings.</text>
  <rect x="600" y="416" width="120" height="28" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="616" y="434" font-size="12">Download backup</text>

  <text x="80" y="468">Restore from a backup file</text>
  <text x="80" y="486" fill="#6b6258" font-size="11">Replaces everything. Choose carefully.</text>
</svg>
