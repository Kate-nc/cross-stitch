<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1a1a1a">
  <rect width="900" height="600" fill="rgba(0,0,0,0.4)"/>
  <rect x="60" y="40" width="780" height="520" rx="12" fill="#fff"/>

  <!-- Step indicator -->
  <text x="80" y="70" font-weight="600" font-size="14">First-time sync set-up</text>
  <text x="80" y="90" fill="#6b6258" font-size="11">Step 1 of 3 — Welcome</text>
  <rect x="80" y="100" width="240" height="3" fill="#3a7a3a"/>
  <rect x="320" y="100" width="240" height="3" fill="#e6e1d6"/>
  <rect x="560" y="100" width="240" height="3" fill="#e6e1d6"/>

  <line x1="80" y1="116" x2="820" y2="116" stroke="#e6e1d6"/>

  <!-- Hero -->
  <text x="450" y="160" text-anchor="middle" font-size="20" font-weight="600">Let's match your patterns up</text>
  <text x="450" y="184" text-anchor="middle" fill="#6b6258">We found patterns on this device <tspan font-weight="600" fill="#1a1a1a">and</tspan> in your sync folder.</text>
  <text x="450" y="202" text-anchor="middle" fill="#6b6258">Before we merge them, let's check which ones are the same.</text>

  <!-- Side-by-side counts -->
  <rect x="180" y="240" width="240" height="160" rx="10" fill="#fafaf6" stroke="#e6e1d6"/>
  <text x="300" y="270" text-anchor="middle" font-weight="600">On this device</text>
  <text x="300" y="320" text-anchor="middle" font-size="42" font-weight="700">5</text>
  <text x="300" y="350" text-anchor="middle" fill="#6b6258" font-size="12">projects</text>
  <text x="300" y="378" text-anchor="middle" fill="#6b6258" font-size="11">~143 KB · last edit 12 minutes ago</text>

  <rect x="480" y="240" width="240" height="160" rx="10" fill="#fafaf6" stroke="#e6e1d6"/>
  <text x="600" y="270" text-anchor="middle" font-weight="600">In sync folder</text>
  <text x="600" y="320" text-anchor="middle" font-size="42" font-weight="700">7</text>
  <text x="600" y="350" text-anchor="middle" fill="#6b6258" font-size="12">projects from Tablet</text>
  <text x="600" y="378" text-anchor="middle" fill="#6b6258" font-size="11">~219 KB · last update 2 hours ago</text>

  <!-- Reassurance -->
  <rect x="180" y="424" width="540" height="60" rx="8" fill="#eef5ee" stroke="#cce0cc"/>
  <text x="200" y="446" font-weight="600" fill="#3a5a3a">We'll back up your local data first</text>
  <text x="200" y="464" fill="#3a5a3a" font-size="11">Nothing will be deleted or overwritten without your confirmation.</text>
  <text x="200" y="478" fill="#3a5a3a" font-size="11">A 7-day local snapshot is created automatically.</text>

  <!-- Footer -->
  <line x1="80" y1="514" x2="820" y2="514" stroke="#e6e1d6"/>
  <rect x="650" y="528" width="160" height="32" rx="6" fill="#3a7a3a"/>
  <text x="730" y="548" text-anchor="middle" fill="#fff" font-weight="600">Next: Match-up →</text>
  <rect x="540" y="528" width="100" height="32" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="590" y="548" text-anchor="middle">Cancel</text>
</svg>
