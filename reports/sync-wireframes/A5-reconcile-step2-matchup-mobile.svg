<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 720" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#1a1a1a">
  <rect width="380" height="720" fill="#f7f5f0"/>
  <!-- Mobile chrome -->
  <rect x="0" y="0" width="380" height="56" fill="#fff"/>
  <text x="20" y="34" font-weight="600">Sync set-up — Step 2 of 3</text>
  <line x1="0" y1="56" x2="380" y2="56" stroke="#e6e1d6"/>

  <text x="20" y="86" fill="#6b6258" font-size="11">Confirm or change each suggested match.</text>

  <g transform="translate(0, 100)">
    <!-- Card 1 -->
    <rect x="20" y="0" width="340" height="138" rx="10" fill="#fff" stroke="#e6e1d6"/>
    <text x="36" y="22" font-weight="600">Cottage Garden Sampler</text>
    <text x="36" y="40" fill="#6b6258" font-size="11">Local · 80×80 · 47% done</text>
    <line x1="36" y1="50" x2="344" y2="50" stroke="#e6e1d6" stroke-dasharray="2 2"/>
    <text x="36" y="68" font-weight="600" font-size="11">Matched in sync folder:</text>
    <text x="36" y="84">Cottage Garden Sampler</text>
    <text x="36" y="100" fill="#6b6258" font-size="11">Tablet · 80×80 · 38% done · 2h ago</text>
    <rect x="36" y="108" width="100" height="24" rx="4" fill="#3a7a3a"/>
    <text x="86" y="124" text-anchor="middle" fill="#fff">Merge ✓</text>
    <rect x="142" y="108" width="92" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
    <text x="188" y="124" text-anchor="middle">Keep both</text>
    <text x="240" y="124" font-size="11" fill="#3a7a3a">Strong match</text>

    <!-- Card 2 -->
    <rect x="20" y="156" width="340" height="138" rx="10" fill="#fff" stroke="#e6e1d6"/>
    <text x="36" y="178" font-weight="600">DMC 3-page Pattern</text>
    <text x="36" y="196" fill="#6b6258" font-size="11">Local · 120×180 · 8% done</text>
    <line x1="36" y1="206" x2="344" y2="206" stroke="#e6e1d6" stroke-dasharray="2 2"/>
    <text x="36" y="224" font-weight="600" font-size="11">Matched in sync folder:</text>
    <text x="36" y="240">Mountains 3-page</text>
    <text x="36" y="256" fill="#6b6258" font-size="11">Tablet · 120×180 · 0% done · 1d ago</text>
    <rect x="36" y="264" width="100" height="24" rx="4" fill="#fff" stroke="#c2941b"/>
    <text x="86" y="280" text-anchor="middle" fill="#7a5a10">Merge</text>
    <rect x="142" y="264" width="92" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
    <text x="188" y="280" text-anchor="middle">Keep both</text>
    <text x="240" y="280" font-size="11" fill="#7a5a10">⚠ Review</text>

    <!-- Card 3 -->
    <rect x="20" y="312" width="340" height="92" rx="10" fill="#fff" stroke="#e6e1d6"/>
    <text x="36" y="334" font-weight="600">WIP — Stars</text>
    <text x="36" y="352" fill="#6b6258" font-size="11">Local · 40×40 · 12% done</text>
    <text x="36" y="378" fill="#9b9385" font-size="11" font-style="italic">No matching pattern in sync folder</text>
    <text x="36" y="394" font-size="11" fill="#3a5a3a">→ Will be kept local-only</text>

    <!-- Card 4 (remote-only) -->
    <rect x="20" y="422" width="340" height="92" rx="10" fill="#fff" stroke="#e6e1d6"/>
    <text x="36" y="444" font-weight="600">Snowflake Border</text>
    <text x="36" y="462" fill="#6b6258" font-size="11">Tablet · 60×20 · 100% done</text>
    <text x="36" y="488" fill="#9b9385" font-size="11" font-style="italic">No matching pattern locally</text>
    <text x="36" y="504" font-size="11" fill="#3a5a3a">→ Will be imported as new</text>
  </g>

  <!-- Sticky footer -->
  <rect x="0" y="640" width="380" height="80" fill="#fff"/>
  <line x1="0" y1="640" x2="380" y2="640" stroke="#e6e1d6"/>
  <rect x="20" y="660" width="100" height="40" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="70" y="684" text-anchor="middle">← Back</text>
  <rect x="130" y="660" width="230" height="40" rx="6" fill="#3a7a3a"/>
  <text x="245" y="684" text-anchor="middle" fill="#fff" font-weight="600">Next: Confirm →</text>
</svg>
