<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 800" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#1a1a1a">
  <rect width="760" height="800" fill="rgba(0,0,0,0.4)"/>
  <rect x="40" y="40" width="680" height="720" rx="12" fill="#fff"/>

  <text x="60" y="72" font-weight="600" font-size="15">Import sync update — Tablet</text>
  <text x="60" y="90" fill="#6b6258" font-size="11">Tue 14:22 · 219 KB · since your last sync 2 hours ago</text>

  <!-- Stats badges -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#eef5ee"/>
    <text x="40" y="15" text-anchor="middle" fill="#3a5a3a">2 new</text>
    <rect x="88" y="0" width="80" height="22" rx="11" fill="#eef2f7"/>
    <text x="128" y="15" text-anchor="middle" fill="#1a3a6a">3 merge</text>
    <rect x="176" y="0" width="100" height="22" rx="11" fill="#fff5d4"/>
    <text x="226" y="15" text-anchor="middle" fill="#7a5a10">⚠ 2 possible dup</text>
    <rect x="284" y="0" width="80" height="22" rx="11" fill="#fcebea"/>
    <text x="324" y="15" text-anchor="middle" fill="#8a2a22">1 conflict</text>
    <rect x="372" y="0" width="120" height="22" rx="11" fill="#eef2f7"/>
    <text x="432" y="15" text-anchor="middle" fill="#1a3a6a">stash update</text>
  </g>

  <!-- New section -->
  <g transform="translate(60, 156)">
    <text x="0" y="14" font-weight="600">New patterns to add (2)</text>
    <rect x="0" y="22" width="640" height="32" rx="6" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="14" y="42">Spring Wreath</text>
    <text x="600" y="42" text-anchor="end" fill="#6b6258">45×45</text>
    <rect x="0" y="58" width="640" height="32" rx="6" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="14" y="78">Snowflake Border</text>
    <text x="600" y="78" text-anchor="end" fill="#6b6258">60×20</text>
  </g>

  <!-- Possible duplicates -->
  <g transform="translate(60, 264)">
    <text x="0" y="14" font-weight="600" fill="#7a5a10">⚠ Possible duplicates (2) — same pattern, different IDs</text>
    <rect x="0" y="22" width="640" height="80" rx="6" fill="#fff8e6" stroke="#e0c870"/>
    <text x="14" y="42" font-weight="600">Cottage Garden Sampler</text>
    <text x="14" y="58" fill="#6b6258" font-size="11">Local: proj_180_b · Tablet: proj_171_a · same chart, +247 stitches on Tablet</text>
    <g transform="translate(14, 70)" font-size="11">
      <rect x="0" y="0" width="98" height="24" rx="4" fill="#3a7a3a"/>
      <text x="49" y="16" text-anchor="middle" fill="#fff">Merge ✓</text>
      <rect x="106" y="0" width="84" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="148" y="16" text-anchor="middle">Keep both</text>
      <rect x="198" y="0" width="110" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="253" y="16" text-anchor="middle">Replace local</text>
    </g>

    <rect x="0" y="110" width="640" height="80" rx="6" fill="#fff8e6" stroke="#e0c870"/>
    <text x="14" y="130" font-weight="600">DMC 3-page Pattern — Mountains</text>
    <text x="14" y="146" fill="#6b6258" font-size="11">Local: proj_181_b · Tablet: proj_172_a · same chart, no progress diff</text>
    <g transform="translate(14, 158)" font-size="11">
      <rect x="0" y="0" width="98" height="24" rx="4" fill="#3a7a3a"/>
      <text x="49" y="16" text-anchor="middle" fill="#fff">Merge ✓</text>
      <rect x="106" y="0" width="84" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="148" y="16" text-anchor="middle">Keep both</text>
      <rect x="198" y="0" width="110" height="24" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="253" y="16" text-anchor="middle">Replace local</text>
    </g>
  </g>

  <!-- Progress merges (informational) -->
  <g transform="translate(60, 480)">
    <text x="0" y="14" font-weight="600">Progress merges (3)</text>
    <text x="0" y="34" fill="#6b6258" font-size="11">Stitches completed on either device are kept — never undone.</text>
    <rect x="0" y="44" width="640" height="24" rx="4" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="14" y="60">Spring Wreath · +12 stitches</text>
    <rect x="0" y="72" width="640" height="24" rx="4" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="14" y="88">Snowflake Border · no change (already complete here)</text>
    <rect x="0" y="100" width="640" height="24" rx="4" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="14" y="116">Cottage Garden Sampler · +247 stitches</text>
  </g>

  <!-- Conflict -->
  <g transform="translate(60, 622)">
    <text x="0" y="14" font-weight="600" fill="#8a2a22">Chart conflict (1) — choose how to resolve</text>
    <rect x="0" y="22" width="640" height="64" rx="6" fill="#fcebea" stroke="#e0a8a4"/>
    <text x="14" y="42" font-weight="600">Test pattern</text>
    <text x="14" y="58" fill="#6b6258" font-size="11">Chart edited on both devices — picking one will discard the other's chart edits</text>
    <g transform="translate(14, 66)" font-size="11">
      <rect x="0" y="0" width="86" height="20" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="43" y="14" text-anchor="middle">Keep local</text>
      <rect x="94" y="0" width="98" height="20" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="143" y="14" text-anchor="middle">Keep remote</text>
      <rect x="200" y="0" width="86" height="20" rx="4" fill="#fff" stroke="#cfc8b9"/>
      <text x="243" y="14" text-anchor="middle">Keep both</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="60" y1="724" x2="700" y2="724" stroke="#e6e1d6"/>
  <rect x="500" y="734" width="80" height="28" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="540" y="752" text-anchor="middle">Cancel</text>
  <rect x="588" y="734" width="112" height="28" rx="6" fill="#3a7a3a"/>
  <text x="644" y="752" text-anchor="middle" fill="#fff" font-weight="600">Apply sync</text>
</svg>
