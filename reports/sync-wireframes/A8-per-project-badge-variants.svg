<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#1a1a1a">
  <rect width="800" height="360" fill="#f7f5f0"/>
  <text x="40" y="36" font-weight="600" font-size="14">Per-project sync badge — variants on a /home project card</text>
  <text x="40" y="56" fill="#6b6258" font-size="11">A 6 px coloured dot in the corner; tooltip on hover/focus.</text>

  <!-- Card 1: synced -->
  <g transform="translate(40, 80)">
    <rect width="220" height="240" rx="12" fill="#fff" stroke="#e6e1d6"/>
    <rect width="220" height="120" rx="12" fill="#e8d8c4"/>
    <circle cx="200" cy="20" r="6" fill="#3a7a3a"/>
    <text x="14" y="146" font-weight="600">Cottage Garden Sampler</text>
    <text x="14" y="164" fill="#6b6258" font-size="11">80×80 · 47% done</text>
    <text x="14" y="184" fill="#6b6258" font-size="11">Synced 2 min ago</text>
  </g>

  <!-- Card 2: local-only -->
  <g transform="translate(280, 80)">
    <rect width="220" height="240" rx="12" fill="#fff" stroke="#e6e1d6"/>
    <rect width="220" height="120" rx="12" fill="#cfd8e3"/>
    <circle cx="200" cy="20" r="6" fill="#9b9385"/>
    <text x="14" y="146" font-weight="600">WIP — Stars</text>
    <text x="14" y="164" fill="#6b6258" font-size="11">40×40 · 12% done</text>
    <text x="14" y="184" fill="#6b6258" font-size="11">Local only</text>
  </g>

  <!-- Card 3: pending updates -->
  <g transform="translate(520, 80)">
    <rect width="220" height="240" rx="12" fill="#fff" stroke="#e6e1d6"/>
    <rect width="220" height="120" rx="12" fill="#dfd6c0"/>
    <circle cx="200" cy="20" r="6" fill="#c2941b"/>
    <text x="14" y="146" font-weight="600">Mountains 3-page</text>
    <text x="14" y="164" fill="#6b6258" font-size="11">120×180 · 8% done</text>
    <text x="14" y="184" fill="#6b6258" font-size="11">⚠ Updates from Tablet</text>
    <rect x="14" y="200" width="120" height="24" rx="4" fill="#3a7a3a"/>
    <text x="74" y="216" text-anchor="middle" fill="#fff" font-size="11">Review (3 changes)</text>
  </g>
</svg>
