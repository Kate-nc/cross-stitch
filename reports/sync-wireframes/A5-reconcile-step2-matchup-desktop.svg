<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#1a1a1a">
  <rect width="1000" height="760" fill="rgba(0,0,0,0.4)"/>
  <rect x="60" y="40" width="880" height="680" rx="12" fill="#fff"/>

  <text x="80" y="70" font-weight="600" font-size="14">First-time sync set-up</text>
  <text x="80" y="90" fill="#6b6258" font-size="11">Step 2 of 3 — Match patterns</text>
  <rect x="80" y="100" width="280" height="3" fill="#3a7a3a"/>
  <rect x="360" y="100" width="280" height="3" fill="#3a7a3a"/>
  <rect x="640" y="100" width="280" height="3" fill="#e6e1d6"/>
  <line x1="80" y1="116" x2="920" y2="116" stroke="#e6e1d6"/>

  <text x="80" y="142" fill="#6b6258">We've suggested matches based on chart contents and names. Confirm, change or break each link.</text>

  <!-- Column headers -->
  <text x="120" y="180" font-weight="600">On this device (5)</text>
  <text x="700" y="180" font-weight="600">In sync folder — Tablet (7)</text>
  <text x="500" y="180" text-anchor="middle" font-weight="600">Action</text>

  <!-- Match row 1 — strong -->
  <g transform="translate(0, 200)">
    <rect x="80" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="100" y="22" font-weight="600">Cottage Garden Sampler</text>
    <text x="100" y="40" fill="#6b6258">80×80 · 12 colours · 47% done</text>
    <text x="100" y="56" fill="#6b6258" font-size="11">Edited Tue, 14:22 · proj_180_b</text>

    <rect x="600" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="620" y="22" font-weight="600">Cottage Garden Sampler</text>
    <text x="620" y="40" fill="#6b6258">80×80 · 12 colours · 38% done</text>
    <text x="620" y="56" fill="#6b6258" font-size="11">Tablet · 2h ago · proj_171_a</text>

    <line x1="400" y1="32" x2="600" y2="32" stroke="#3a7a3a" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="430" y="14" width="140" height="36" rx="6" fill="#3a7a3a"/>
    <text x="500" y="36" text-anchor="middle" fill="#fff" font-weight="600">Merge ✓</text>
    <text x="500" y="58" text-anchor="middle" fill="#3a5a3a" font-size="10">Same chart, different progress</text>
  </g>

  <!-- Match row 2 — medium -->
  <g transform="translate(0, 280)">
    <rect x="80" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="100" y="22" font-weight="600">DMC 3-page Pattern — Mountains</text>
    <text x="100" y="40" fill="#6b6258">120×180 · 24 colours · 8% done</text>
    <text x="100" y="56" fill="#6b6258" font-size="11">Edited Mon · proj_181_b</text>

    <rect x="600" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="620" y="22" font-weight="600">Mountains 3-page</text>
    <text x="620" y="40" fill="#6b6258">120×180 · 24 colours · 0% done</text>
    <text x="620" y="56" fill="#6b6258" font-size="11">Tablet · 1d ago · proj_172_a</text>

    <line x1="400" y1="32" x2="600" y2="32" stroke="#c2941b" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="430" y="14" width="140" height="36" rx="6" fill="#fff" stroke="#c2941b"/>
    <text x="500" y="36" text-anchor="middle" fill="#7a5a10" font-weight="600">Suggested: Merge</text>
    <text x="500" y="58" text-anchor="middle" fill="#7a5a10" font-size="10">⚠ similar — review</text>
  </g>

  <!-- Match row 3 — local only -->
  <g transform="translate(0, 360)">
    <rect x="80" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="100" y="22" font-weight="600">WIP — Stars</text>
    <text x="100" y="40" fill="#6b6258">40×40 · 6 colours · 12% done</text>
    <text x="100" y="56" fill="#6b6258" font-size="11">Edited 3d ago · proj_182_b</text>

    <rect x="600" y="0" width="320" height="64" rx="8" fill="#fafafa" stroke="#e6e1d6" stroke-dasharray="3 3"/>
    <text x="760" y="38" text-anchor="middle" fill="#9b9385" font-style="italic">— no match —</text>

    <rect x="430" y="14" width="140" height="36" rx="6" fill="#fff" stroke="#cfc8b9"/>
    <text x="500" y="36" text-anchor="middle" font-size="11">Keep local only</text>
  </g>

  <!-- Remote-only -->
  <g transform="translate(0, 440)">
    <rect x="80" y="0" width="320" height="64" rx="8" fill="#fafafa" stroke="#e6e1d6" stroke-dasharray="3 3"/>
    <text x="240" y="38" text-anchor="middle" fill="#9b9385" font-style="italic">— no match —</text>

    <rect x="600" y="0" width="320" height="64" rx="8" fill="#fafaf6" stroke="#e6e1d6"/>
    <text x="620" y="22" font-weight="600">Snowflake Border</text>
    <text x="620" y="40" fill="#6b6258">60×20 · 3 colours · 100% done</text>
    <text x="620" y="56" fill="#6b6258" font-size="11">Tablet · 5d ago · proj_173_a</text>

    <rect x="430" y="14" width="140" height="36" rx="6" fill="#fff" stroke="#cfc8b9"/>
    <text x="500" y="36" text-anchor="middle" font-size="11">Import as new</text>
  </g>

  <!-- summary bar -->
  <rect x="80" y="540" width="840" height="48" rx="8" fill="#eef5ee" stroke="#cce0cc"/>
  <text x="100" y="568" fill="#3a5a3a" font-weight="600">2 to merge · 2 to import · 1 local-only kept · 0 conflicts</text>
  <text x="100" y="582" fill="#3a5a3a" font-size="11">No data will be lost. Local backup created before any changes.</text>

  <line x1="80" y1="624" x2="920" y2="624" stroke="#e6e1d6"/>
  <rect x="640" y="640" width="120" height="32" rx="6" fill="#fff" stroke="#cfc8b9"/>
  <text x="700" y="660" text-anchor="middle">← Back</text>
  <rect x="770" y="640" width="150" height="32" rx="6" fill="#3a7a3a"/>
  <text x="845" y="660" text-anchor="middle" fill="#fff" font-weight="600">Next: Confirm →</text>
</svg>
