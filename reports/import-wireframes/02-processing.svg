<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .accent { fill: #B8553F; }
    .accentBg { fill: #B8553F; }
    .accentSoft { fill: #B8553F; opacity: 0.15; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .mono { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 12px; fill: #6B6359; }
    .check { fill: #527A3D; }
    .ghostBtn { fill: #FFFFFF; stroke: #D9D0BE; }
    .ghostBtnTxt { fill: #1F1A14; font-size: 13px; }
  </style>
  <rect class="bg" width="960" height="640"/>
  <rect x="0" y="0" width="960" height="48" fill="#1F1A14" opacity="0.06"/>
  <text x="20" y="30" class="ink h2">Cross Stitch · Library</text>
  <rect x="0" y="48" width="960" height="592" fill="#1F1A14" opacity="0.18"/>

  <!-- Modal -->
  <rect class="surface" x="120" y="100" width="720" height="440" rx="12" stroke-width="1"/>

  <text x="160" y="148" class="ink h1">Reading PAT1968_2.pdf</text>
  <text x="160" y="172" class="ink2 body">4 pages · 1.2 MB · DMC pattern detected</text>

  <!-- Stage timeline -->
  <g transform="translate(160,220)">
    <!-- Stage rows: completed (green check), in-progress (accent dot), pending (grey) -->
    <g>
      <circle cx="14" cy="14" r="9" class="check"/>
      <text x="34" y="18" class="ink body">Sniff format · PDF</text>
      <text x="600" y="18" text-anchor="end" class="mono">12 ms</text>
    </g>
    <g transform="translate(0,36)">
      <circle cx="14" cy="14" r="9" class="check"/>
      <text x="34" y="18" class="ink body">Classify pages · DMC publisher fingerprint</text>
      <text x="600" y="18" text-anchor="end" class="mono">88 ms</text>
    </g>
    <g transform="translate(0,72)">
      <circle cx="14" cy="14" r="9" class="check"/>
      <text x="34" y="18" class="ink body">Extract legend · 12 colours</text>
      <text x="600" y="18" text-anchor="end" class="mono">204 ms</text>
    </g>
    <g transform="translate(0,108)">
      <circle cx="14" cy="14" r="9" class="accent"/>
      <text x="34" y="18" class="ink h2">Extract grid · page 3 of 4</text>
      <text x="600" y="18" text-anchor="end" class="mono">running…</text>
    </g>
    <g transform="translate(0,144)">
      <circle cx="14" cy="14" r="9" fill="#D9D0BE"/>
      <text x="34" y="18" class="ink2 body">Assemble multi-page chart</text>
    </g>
    <g transform="translate(0,180)">
      <circle cx="14" cy="14" r="9" fill="#D9D0BE"/>
      <text x="34" y="18" class="ink2 body">Resolve palette &amp; validate</text>
    </g>
  </g>

  <!-- Progress bar -->
  <text x="160" y="450" class="ink2 caption">Step 4 of 6 · Resolving palette</text>
  <rect x="160" y="460" width="640" height="8" rx="4" fill="#EFE7D6"/>
  <rect x="160" y="460" width="500" height="8" rx="4" class="accentBg"/>
  <text x="800" y="455" text-anchor="end" class="ink2 caption">78%</text>

  <!-- Cancel -->
  <rect class="ghostBtn" x="700" y="490" width="100" height="36" rx="8" stroke-width="1"/>
  <text x="750" y="513" text-anchor="middle" class="ghostBtnTxt">Cancel</text>
</svg>
