<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .btn { fill: #B8553F; }
    .btnText { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
    .ghostBtn { fill: #FFFFFF; stroke: #D9D0BE; }
    .ghostBtnTxt { fill: #1F1A14; font-size: 13px; font-weight: 500; }
  </style>
  <rect class="bg" width="960" height="640"/>

  <text x="40" y="40" class="ink2 caption">← Back to review</text>
  <text x="40" y="68" class="ink h1">Fix a misread cell</text>
  <text x="40" y="90" class="ink2 body">Side-by-side: original PDF page (left) vs the parser's output (right). Cell (45, 12) is selected.</text>

  <!-- LEFT: original PDF page render -->
  <rect class="surface" x="40" y="110" width="430" height="460" rx="10" stroke-width="1"/>
  <text x="60" y="134" class="ink h2">Original · page 2</text>
  <text x="450" y="134" text-anchor="end" class="ink2 caption">PAT1968_2.pdf</text>
  <g transform="translate(60,150)">
    <rect width="390" height="400" fill="#FAF6EC" stroke="#D9D0BE"/>
    <!-- chart-like cells with real-ish layout -->
    <g>
      <g fill="#1F1A14">
        <rect x="20" y="20" width="9" height="9"/><rect x="29" y="20" width="9" height="9"/>
        <rect x="20" y="29" width="9" height="9"/><rect x="38" y="38" width="9" height="9"/>
      </g>
      <g fill="#B8553F">
        <rect x="80" y="40" width="9" height="9"/><rect x="89" y="40" width="9" height="9"/>
        <rect x="80" y="49" width="9" height="9"/><rect x="89" y="49" width="9" height="9"/>
        <rect x="98" y="49" width="9" height="9"/>
      </g>
      <g fill="#C97D2C">
        <rect x="170" y="80" width="9" height="9"/><rect x="179" y="80" width="9" height="9"/>
        <rect x="170" y="89" width="9" height="9"/><rect x="188" y="89" width="9" height="9"/>
      </g>
      <g fill="#527A3D">
        <rect x="80" y="200" width="9" height="9"/><rect x="89" y="209" width="9" height="9"/>
        <rect x="98" y="218" width="9" height="9"/><rect x="107" y="227" width="9" height="9"/>
        <rect x="116" y="236" width="9" height="9"/><rect x="125" y="245" width="9" height="9"/>
      </g>
      <g fill="#2E5266">
        <rect x="240" y="180" width="9" height="9"/><rect x="249" y="180" width="9" height="9"/>
        <rect x="240" y="189" width="9" height="9"/>
      </g>
      <!-- selected cell ring -->
      <rect x="170" y="80" width="9" height="9" fill="none" stroke="#B8553F" stroke-width="2"/>
      <!-- callout line -->
      <line x1="183" y1="84" x2="280" y2="84" stroke="#B8553F" stroke-dasharray="3 3"/>
      <text x="285" y="86" class="ink caption" fill="#B8553F">cell (45, 12)</text>
    </g>
    <!-- grid lines overlay (toggle on) -->
    <g stroke="#D9D0BE" stroke-width="0.5" opacity="0.6">
      <line x1="0" y1="50" x2="390" y2="50"/>
      <line x1="0" y1="100" x2="390" y2="100"/>
      <line x1="0" y1="150" x2="390" y2="150"/>
      <line x1="0" y1="200" x2="390" y2="200"/>
      <line x1="0" y1="250" x2="390" y2="250"/>
      <line x1="0" y1="300" x2="390" y2="300"/>
      <line x1="0" y1="350" x2="390" y2="350"/>
      <line x1="50" y1="0" x2="50" y2="400"/>
      <line x1="100" y1="0" x2="100" y2="400"/>
      <line x1="150" y1="0" x2="150" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="250" y1="0" x2="250" y2="400"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="350" y1="0" x2="350" y2="400"/>
    </g>
  </g>

  <!-- RIGHT: cell inspector + extracted fragment -->
  <rect class="surface" x="490" y="110" width="430" height="460" rx="10" stroke-width="1"/>
  <text x="510" y="134" class="ink h2">Extracted · cell (45, 12)</text>
  <text x="900" y="134" text-anchor="end" class="ink2 caption">close-up</text>

  <!-- mini extracted preview -->
  <g transform="translate(510,150)">
    <rect width="390" height="160" fill="#FAF6EC" stroke="#D9D0BE"/>
    <g>
      <g fill="#1F1A14"><rect x="20" y="20" width="18" height="18"/><rect x="38" y="20" width="18" height="18"/></g>
      <g fill="#B8553F"><rect x="80" y="40" width="18" height="18"/><rect x="98" y="40" width="18" height="18"/></g>
      <g fill="#C97D2C">
        <!-- selected -->
        <rect x="170" y="80" width="18" height="18"/>
        <rect x="188" y="80" width="18" height="18"/>
      </g>
      <rect x="170" y="80" width="18" height="18" fill="none" stroke="#B8553F" stroke-width="3"/>
    </g>
  </g>

  <!-- Inspector panel -->
  <rect class="surface" x="510" y="330" width="390" height="220" rx="8" fill="#FBEFD7" stroke="#C97D2C" stroke-width="1"/>
  <text x="530" y="356" class="ink h2">Cell (45, 12)</text>
  <text x="884" y="356" text-anchor="end" class="ink2 caption" style="cursor:pointer">close</text>

  <g transform="translate(530,372)">
    <rect x="0" y="0" width="22" height="22" fill="#C97D2C"/>
    <text x="32" y="16" class="ink body">Detected: 740 · Tangerine</text>
    <text x="380" y="16" text-anchor="end" class="ink2 caption">conf 72%</text>
  </g>
  <text x="530" y="416" class="ink2 caption">Source: legend (RGB match, 1.8 ΔE)</text>

  <text x="530" y="438" class="ink2 h2">Alternatives</text>
  <g transform="translate(530,448)" class="body">
    <rect x="0" y="0" width="14" height="14" fill="#B8553F"/>
    <text x="22" y="12" class="ink">666 · Bright Red</text>
    <text x="370" y="12" text-anchor="end" class="ink2">68%</text>
  </g>
  <g transform="translate(530,470)" class="body">
    <rect x="0" y="0" width="14" height="14" fill="#A33"/>
    <text x="22" y="12" class="ink">321 · Christmas Red</text>
    <text x="370" y="12" text-anchor="end" class="ink2">61%</text>
  </g>

  <rect class="ghostBtn" x="530" y="500" width="120" height="32" rx="6" stroke-width="1"/>
  <text x="590" y="520" text-anchor="middle" class="ghostBtnTxt">Use 666</text>
  <rect class="ghostBtn" x="660" y="500" width="120" height="32" rx="6" stroke-width="1"/>
  <text x="720" y="520" text-anchor="middle" class="ghostBtnTxt">Pick another…</text>
  <rect class="btn" x="790" y="500" width="100" height="32" rx="6"/>
  <text x="840" y="520" text-anchor="middle" class="btnText">Keep 740</text>

  <!-- Bottom actions -->
  <text x="40" y="608" class="ink2 caption">87 cells share this assignment.  [Apply correction to all 87]</text>
  <rect class="ghostBtn" x="700" y="588" width="100" height="32" rx="8" stroke-width="1"/>
  <text x="750" y="608" text-anchor="middle" class="ghostBtnTxt">Done</text>
</svg>
