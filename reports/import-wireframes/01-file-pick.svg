<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .line { stroke: #D9D0BE; fill: none; }
    .accent { fill: #B8553F; }
    .accentLine { stroke: #B8553F; fill: none; }
    .dashed { stroke: #B8553F; stroke-dasharray: 6 4; fill: none; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 16px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .btn { fill: #B8553F; }
    .btnText { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
    .btnGhost { fill: #FFFFFF; stroke: #D9D0BE; }
    .btnGhostText { fill: #1F1A14; font-size: 13px; font-weight: 500; }
  </style>

  <rect class="bg" width="960" height="640"/>

  <!-- App chrome (dimmed behind modal) -->
  <rect x="0" y="0" width="960" height="48" fill="#1F1A14" opacity="0.06"/>
  <text x="20" y="30" class="ink h2">Cross Stitch · Library</text>
  <rect x="0" y="48" width="960" height="592" fill="#1F1A14" opacity="0.18"/>

  <!-- Modal -->
  <rect class="surface" x="120" y="100" width="720" height="440" rx="12" stroke-width="1"/>

  <!-- Modal header -->
  <text x="160" y="148" class="ink h1">Import a pattern file</text>
  <text x="160" y="172" class="ink2 body">We'll read it, extract the chart and palette, and let you confirm before importing.</text>
  <text x="800" y="148" text-anchor="end" class="ink2 body" style="cursor:pointer">Cancel</text>

  <!-- Drop zone -->
  <rect class="dashed" x="160" y="200" width="640" height="240" rx="14" stroke-width="2"/>
  <text x="480" y="290" text-anchor="middle" class="ink h2">Drop a pattern file here</text>
  <text x="480" y="316" text-anchor="middle" class="ink2 body">or</text>
  <rect class="btn" x="412" y="334" width="136" height="40" rx="8"/>
  <text x="480" y="360" text-anchor="middle" class="btnText">Browse files…</text>
  <text x="480" y="406" text-anchor="middle" class="ink2 caption">PDF · OXS · Project JSON · PNG · JPG · GIF</text>

  <!-- Help row -->
  <text x="160" y="495" class="ink h2">Recognised publishers</text>
  <g transform="translate(160,510)">
    <rect class="surface" x="0" y="0" width="120" height="22" rx="4" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" class="ink body">DMC freebies</text>
    <rect class="surface" x="130" y="0" width="120" height="22" rx="4" stroke-width="1"/>
    <text x="190" y="15" text-anchor="middle" class="ink body">flosscross</text>
    <rect class="surface" x="260" y="0" width="120" height="22" rx="4" stroke-width="1"/>
    <text x="320" y="15" text-anchor="middle" class="ink body">PatternKeeper</text>
    <rect class="surface" x="390" y="0" width="120" height="22" rx="4" stroke-width="1"/>
    <text x="450" y="15" text-anchor="middle" class="ink2 body">Generic image</text>
  </g>
</svg>
