<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .btn { fill: #B8553F; }
    .btnText { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
    .ghostBtn { fill: #FFFFFF; stroke: #D9D0BE; }
    .ghostBtnTxt { fill: #1F1A14; font-size: 13px; font-weight: 500; }
  </style>
  <rect class="bg" width="960" height="640"/>

  <!-- App chrome (Creator) -->
  <rect x="0" y="0" width="960" height="48" fill="#FFFFFF" stroke="#D9D0BE"/>
  <text x="20" y="30" class="ink h2">Cross Stitch · Creator</text>
  <text x="940" y="30" text-anchor="end" class="ink2 caption">Bouquet Floral · saved just now</text>

  <!-- Toast/banner: import success -->
  <rect x="40" y="68" width="880" height="60" rx="8" fill="#E8EDD4" stroke="#527A3D"/>
  <circle cx="76" cy="98" r="14" fill="#527A3D"/>
  <path d="M70 98 l5 5 l9 -10" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  <text x="104" y="92" class="ink h2">Imported · Bouquet Floral</text>
  <text x="104" y="112" class="ink2 body">From PAT1968_2.pdf · 80 × 80 · 12 colours · 6,394 stitches · attribution preserved</text>
  <text x="900" y="104" text-anchor="end" class="ink2 caption" style="cursor:pointer">Dismiss</text>

  <!-- Sidebar -->
  <rect x="0" y="48" width="220" height="592" fill="#FAF6EC" stroke="#D9D0BE"/>
  <text x="20" y="160" class="ink2 caption">PALETTE</text>
  <g transform="translate(20,176)">
    <rect x="0" y="0" width="18" height="18" fill="#1F1A14"/>
    <text x="28" y="14" class="ink body">310 · Black</text>
  </g>
  <g transform="translate(20,200)">
    <rect x="0" y="0" width="18" height="18" fill="#2E5266"/>
    <text x="28" y="14" class="ink body">3750 · Antique</text>
  </g>
  <g transform="translate(20,224)">
    <rect x="0" y="0" width="18" height="18" fill="#B8553F"/>
    <text x="28" y="14" class="ink body">666 · Bright Red</text>
  </g>
  <g transform="translate(20,248)">
    <rect x="0" y="0" width="18" height="18" fill="#C97D2C"/>
    <text x="28" y="14" class="ink body">740 · Tangerine</text>
  </g>
  <g transform="translate(20,272)">
    <rect x="0" y="0" width="18" height="18" fill="#527A3D"/>
    <text x="28" y="14" class="ink body">911 · Emerald</text>
  </g>
  <g transform="translate(20,296)">
    <rect x="0" y="0" width="18" height="18" fill="#FFFFFF" stroke="#D9D0BE"/>
    <text x="28" y="14" class="ink body">B5200 · Snow</text>
  </g>
  <g transform="translate(20,320)">
    <rect x="0" y="0" width="18" height="18" fill="#E8C9A8"/>
    <text x="28" y="14" class="ink body">945 · Tawny</text>
  </g>
  <text x="20" y="354" class="ink2 caption">+ 5 more</text>

  <!-- Attribution chip (bottom of sidebar) -->
  <rect x="14" y="470" width="192" height="120" rx="8" fill="#FFFFFF" stroke="#D9D0BE"/>
  <text x="28" y="494" class="ink2 caption">SOURCE</text>
  <text x="28" y="512" class="ink h2">PAT1968_2.pdf</text>
  <text x="28" y="530" class="ink2 caption">DMC Studio · © DMC</text>
  <text x="28" y="548" class="ink2 caption">14ct Aida · 14.5 × 14.5 cm</text>
  <text x="28" y="572" class="ink body" fill="#B8553F" style="cursor:pointer">Open original PDF</text>

  <!-- Main canvas area -->
  <rect x="220" y="48" width="740" height="592" fill="#F5F1E8"/>
  <!-- Toolstrip -->
  <rect x="240" y="160" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#D9D0BE"/>
  <text x="260" y="190" class="ink2 caption">TOOLS</text>
  <text x="320" y="190" class="ink body">Stitch · Erase · Fill · Pick · Lasso</text>
  <text x="920" y="190" text-anchor="end" class="ink2 caption">100% · 80 × 80</text>

  <!-- Canvas with the imported pattern -->
  <rect x="240" y="220" width="700" height="400" rx="6" fill="#FFFFFF" stroke="#D9D0BE"/>

  <g transform="translate(310,250)">
    <rect width="560" height="340" fill="#FAF6EC"/>
    <!-- denser bouquet -->
    <g fill="#1F1A14">
      <rect x="120" y="280" width="14" height="14"/><rect x="134" y="280" width="14" height="14"/><rect x="148" y="280" width="14" height="14"/>
      <rect x="162" y="294" width="14" height="14"/><rect x="176" y="308" width="14" height="14"/>
      <rect x="362" y="280" width="14" height="14"/><rect x="376" y="280" width="14" height="14"/><rect x="390" y="280" width="14" height="14"/>
    </g>
    <g fill="#B8553F">
      <rect x="220" y="80" width="14" height="14"/><rect x="234" y="80" width="14" height="14"/>
      <rect x="206" y="94" width="14" height="14"/><rect x="220" y="94" width="14" height="14"/><rect x="234" y="94" width="14" height="14"/><rect x="248" y="94" width="14" height="14"/>
      <rect x="220" y="108" width="14" height="14"/><rect x="234" y="108" width="14" height="14"/>
    </g>
    <g fill="#C97D2C">
      <rect x="276" y="108" width="14" height="14"/><rect x="290" y="108" width="14" height="14"/>
      <rect x="262" y="122" width="14" height="14"/><rect x="276" y="122" width="14" height="14"/><rect x="290" y="122" width="14" height="14"/>
    </g>
    <g fill="#2E5266">
      <rect x="150" y="140" width="14" height="14"/><rect x="164" y="140" width="14" height="14"/><rect x="178" y="154" width="14" height="14"/>
    </g>
    <g fill="#527A3D">
      <rect x="220" y="150" width="14" height="14"/><rect x="234" y="164" width="14" height="14"/><rect x="248" y="178" width="14" height="14"/>
      <rect x="206" y="178" width="14" height="14"/><rect x="220" y="192" width="14" height="14"/><rect x="234" y="206" width="14" height="14"/>
      <rect x="192" y="220" width="14" height="14"/><rect x="206" y="234" width="14" height="14"/><rect x="220" y="248" width="14" height="14"/>
      <rect x="220" y="262" width="14" height="14"/>
    </g>
    <g fill="#E8C9A8">
      <rect x="50" y="50" width="14" height="14"/><rect x="64" y="64" width="14" height="14"/>
      <rect x="476" y="50" width="14" height="14"/><rect x="462" y="64" width="14" height="14"/>
    </g>
    <!-- subtle grid overlay every 10 -->
    <g stroke="#D9D0BE" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="140" x2="560" y2="140"/>
      <line x1="280" y1="0" x2="280" y2="340"/>
    </g>
  </g>
</svg>
