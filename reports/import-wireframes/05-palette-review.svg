<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .accent { fill: #B8553F; }
    .btn { fill: #B8553F; }
    .btnText { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
    .ghostBtn { fill: #FFFFFF; stroke: #D9D0BE; }
    .ghostBtnTxt { fill: #1F1A14; font-size: 13px; font-weight: 500; }
  </style>
  <rect class="bg" width="960" height="640"/>
  <text x="40" y="50" class="ink h1">Palette review · PAT1968_2.pdf</text>
  <text x="40" y="74" class="ink2 body">12 colours extracted from the legend page. 2 need a closer look.</text>

  <!-- Palette table -->
  <rect class="surface" x="40" y="100" width="880" height="500" rx="10" stroke-width="1"/>

  <!-- header row -->
  <g transform="translate(60,120)">
    <text x="0" y="14" class="ink2 caption">SWATCH</text>
    <text x="80" y="14" class="ink2 caption">DMC CODE</text>
    <text x="180" y="14" class="ink2 caption">NAME</text>
    <text x="380" y="14" class="ink2 caption">STITCHES</text>
    <text x="500" y="14" class="ink2 caption">CONFIDENCE</text>
    <text x="780" y="14" class="ink2 caption">ACTIONS</text>
  </g>
  <line x1="60" y1="134" x2="900" y2="134" stroke="#EFE7D6"/>

  <!-- Row 1: 310 -->
  <g transform="translate(60,148)">
    <rect x="0" y="0" width="40" height="32" fill="#1F1A14"/>
    <text x="80" y="20" class="ink h2">310</text>
    <text x="180" y="20" class="ink body">Black</text>
    <text x="380" y="20" class="ink body">1244</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#527A3D"/>
    <text x="710" y="20" class="ink body">100%</text>
  </g>

  <!-- Row 2: 666 expanded with reason -->
  <g transform="translate(60,200)">
    <rect x="0" y="0" width="40" height="32" fill="#B8553F"/>
    <text x="80" y="20" class="ink h2">666</text>
    <text x="180" y="20" class="ink body">Bright Red</text>
    <text x="380" y="20" class="ink body">614</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="156" height="8" rx="4" fill="#C97D2C"/>
    <text x="710" y="20" class="ink body">78%</text>
  </g>
  <!-- expanded panel -->
  <rect class="surface" x="60" y="240" width="840" height="92" rx="8" fill="#FBEFD7" stroke="#C97D2C" stroke-width="1"/>
  <text x="80" y="262" class="ink h2">Why this might be wrong</text>
  <text x="80" y="284" class="ink2 body">The legend swatch RGB drifted 3.2 ΔE from the DMC reference for 666. Two near-matches: 666 (78%), 321 (74%).</text>
  <text x="80" y="304" class="ink2 body">Used in 614 cells. Highlight on chart to verify the colour was applied to the right region.</text>
  <rect class="ghostBtn" x="80" y="312" width="140" height="28" rx="6" stroke-width="1"/>
  <text x="150" y="330" text-anchor="middle" class="ghostBtnTxt">Highlight cells</text>
  <rect class="ghostBtn" x="230" y="312" width="160" height="28" rx="6" stroke-width="1"/>
  <text x="310" y="330" text-anchor="middle" class="ghostBtnTxt">Change DMC code…</text>
  <rect class="btn" x="400" y="312" width="170" height="28" rx="6"/>
  <text x="485" y="330" text-anchor="middle" class="btnText">Confirm 666 is correct</text>

  <!-- Row 3: B5200 -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="40" height="32" fill="#FFFFFF" stroke="#D9D0BE"/>
    <text x="80" y="20" class="ink h2">B5200</text>
    <text x="180" y="20" class="ink body">Snow White</text>
    <text x="380" y="20" class="ink body">320</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="172" height="8" rx="4" fill="#C97D2C"/>
    <text x="710" y="20" class="ink body">86%</text>
  </g>

  <!-- Row 4: 911 -->
  <g transform="translate(60,408)">
    <rect x="0" y="0" width="40" height="32" fill="#527A3D"/>
    <text x="80" y="20" class="ink h2">911</text>
    <text x="180" y="20" class="ink body">Emerald</text>
    <text x="380" y="20" class="ink body">388</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#527A3D"/>
    <text x="710" y="20" class="ink body">100%</text>
  </g>

  <!-- Row 5: 740 -->
  <g transform="translate(60,452)">
    <rect x="0" y="0" width="40" height="32" fill="#C97D2C"/>
    <text x="80" y="20" class="ink h2">740</text>
    <text x="180" y="20" class="ink body">Tangerine</text>
    <text x="380" y="20" class="ink body">412</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="194" height="8" rx="4" fill="#527A3D"/>
    <text x="710" y="20" class="ink body">97%</text>
  </g>

  <!-- Row 6: 945 -->
  <g transform="translate(60,496)">
    <rect x="0" y="0" width="40" height="32" fill="#E8C9A8"/>
    <text x="80" y="20" class="ink h2">945</text>
    <text x="180" y="20" class="ink body">Tawny</text>
    <text x="380" y="20" class="ink body">280</text>
    <rect x="500" y="12" width="200" height="8" rx="4" fill="#EFE7D6"/>
    <rect x="500" y="12" width="190" height="8" rx="4" fill="#527A3D"/>
    <text x="710" y="20" class="ink body">95%</text>
  </g>

  <text x="60" y="560" class="ink2 caption">Showing 6 of 12. Scroll for the rest.</text>

  <rect class="ghostBtn" x="700" y="555" width="100" height="32" rx="8" stroke-width="1"/>
  <text x="750" y="575" text-anchor="middle" class="ghostBtnTxt">Back</text>
  <rect class="btn" x="810" y="555" width="100" height="32" rx="8"/>
  <text x="860" y="575" text-anchor="middle" class="btnText">Continue</text>
</svg>
