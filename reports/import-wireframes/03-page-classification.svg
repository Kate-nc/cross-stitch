<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg { fill: #F5F1E8; }
    .surface { fill: #FFFFFF; stroke: #D9D0BE; }
    .ink { fill: #1F1A14; }
    .ink2 { fill: #6B6359; }
    .h1 { font-size: 22px; font-weight: 600; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 13px; }
    .caption { font-size: 11px; }
    .badge { font-size: 11px; font-weight: 600; }
    .accent { fill: #B8553F; }
    .btn { fill: #B8553F; }
    .btnText { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
    .ghostBtn { fill: #FFFFFF; stroke: #D9D0BE; }
    .ghostBtnTxt { fill: #1F1A14; font-size: 13px; font-weight: 500; }
    .pageThumb { fill: #FAF6EC; stroke: #D9D0BE; }
    .pillHigh { fill: #527A3D; }
    .pillMed { fill: #C97D2C; }
    .pillLow { fill: #B8553F; }
  </style>

  <rect class="bg" width="960" height="640"/>

  <!-- Top bar -->
  <text x="40" y="50" class="ink h1">Importing PAT1968_2.pdf</text>
  <text x="40" y="76" class="ink2 body">DMC pattern · 4 pages · we identified a chart, a legend, and a cover.</text>

  <!-- Page thumbnails row -->
  <g transform="translate(40,110)">
    <!-- page 1 cover -->
    <g>
      <rect class="pageThumb" x="0" y="0" width="200" height="270" rx="6" stroke-width="1"/>
      <!-- mock content: small image -->
      <rect x="20" y="20" width="160" height="120" fill="#E8C9A8"/>
      <rect x="20" y="150" width="100" height="10" fill="#D9D0BE"/>
      <rect x="20" y="170" width="140" height="6" fill="#D9D0BE"/>
      <rect x="20" y="184" width="80" height="6" fill="#D9D0BE"/>
      <text x="100" y="220" text-anchor="middle" class="ink h2">Page 1</text>
      <rect x="50" y="232" width="100" height="22" rx="11" class="pillHigh"/>
      <text x="100" y="248" text-anchor="middle" class="badge" fill="#FFFFFF">Cover · 99%</text>
    </g>
    <!-- page 2 chart -->
    <g transform="translate(220,0)">
      <rect class="pageThumb" x="0" y="0" width="200" height="270" rx="6" stroke-width="1"/>
      <!-- mock chart cells -->
      <g transform="translate(20,20)">
        <g fill="#1F1A14"><rect x="0" y="0" width="6" height="6"/><rect x="12" y="0" width="6" height="6"/><rect x="0" y="12" width="6" height="6"/></g>
        <g fill="#B8553F"><rect x="24" y="0" width="6" height="6"/><rect x="36" y="0" width="6" height="6"/><rect x="48" y="6" width="6" height="6"/></g>
        <g fill="#527A3D"><rect x="60" y="0" width="6" height="6"/><rect x="72" y="6" width="6" height="6"/></g>
        <g fill="#C97D2C"><rect x="84" y="12" width="6" height="6"/><rect x="96" y="0" width="6" height="6"/></g>
        <g fill="#2E5266"><rect x="108" y="6" width="6" height="6"/><rect x="120" y="12" width="6" height="6"/></g>
        <g fill="#1F1A14"><rect x="0" y="24" width="6" height="6"/><rect x="12" y="30" width="6" height="6"/></g>
        <g fill="#B8553F"><rect x="24" y="24" width="6" height="6"/><rect x="36" y="36" width="6" height="6"/></g>
        <g fill="#527A3D"><rect x="48" y="30" width="6" height="6"/><rect x="60" y="42" width="6" height="6"/></g>
        <g fill="#C97D2C"><rect x="72" y="36" width="6" height="6"/><rect x="84" y="48" width="6" height="6"/></g>
        <g fill="#2E5266"><rect x="96" y="42" width="6" height="6"/><rect x="108" y="54" width="6" height="6"/></g>
        <g fill="#1F1A14"><rect x="0" y="60" width="6" height="6"/><rect x="12" y="72" width="6" height="6"/></g>
        <g fill="#B8553F"><rect x="24" y="66" width="6" height="6"/><rect x="36" y="78" width="6" height="6"/></g>
        <g fill="#527A3D"><rect x="48" y="72" width="6" height="6"/></g>
        <g fill="#C97D2C"><rect x="60" y="84" width="6" height="6"/></g>
        <g fill="#2E5266"><rect x="72" y="90" width="6" height="6"/></g>
      </g>
      <text x="100" y="220" text-anchor="middle" class="ink h2">Page 2</text>
      <rect x="40" y="232" width="120" height="22" rx="11" class="pillHigh"/>
      <text x="100" y="248" text-anchor="middle" class="badge" fill="#FFFFFF">Chart left · 96%</text>
    </g>
    <!-- page 3 chart -->
    <g transform="translate(440,0)">
      <rect class="pageThumb" x="0" y="0" width="200" height="270" rx="6" stroke-width="1"/>
      <g transform="translate(20,20)">
        <g fill="#1F1A14"><rect x="60" y="0" width="6" height="6"/><rect x="72" y="6" width="6" height="6"/></g>
        <g fill="#B8553F"><rect x="0" y="0" width="6" height="6"/><rect x="12" y="0" width="6" height="6"/><rect x="24" y="0" width="6" height="6"/></g>
        <g fill="#527A3D"><rect x="36" y="6" width="6" height="6"/><rect x="48" y="12" width="6" height="6"/></g>
        <g fill="#C97D2C"><rect x="84" y="18" width="6" height="6"/></g>
        <g fill="#2E5266"><rect x="96" y="12" width="6" height="6"/><rect x="108" y="6" width="6" height="6"/></g>
        <g fill="#B8553F"><rect x="0" y="24" width="6" height="6"/><rect x="12" y="36" width="6" height="6"/></g>
        <g fill="#527A3D"><rect x="36" y="30" width="6" height="6"/><rect x="48" y="42" width="6" height="6"/></g>
        <g fill="#1F1A14"><rect x="60" y="48" width="6" height="6"/></g>
        <g fill="#C97D2C"><rect x="72" y="54" width="6" height="6"/></g>
        <g fill="#2E5266"><rect x="84" y="60" width="6" height="6"/></g>
      </g>
      <text x="100" y="220" text-anchor="middle" class="ink h2">Page 3</text>
      <rect x="35" y="232" width="130" height="22" rx="11" class="pillHigh"/>
      <text x="100" y="248" text-anchor="middle" class="badge" fill="#FFFFFF">Chart right · 96%</text>
    </g>
    <!-- page 4 legend -->
    <g transform="translate(660,0)">
      <rect class="pageThumb" x="0" y="0" width="200" height="270" rx="6" stroke-width="1"/>
      <g transform="translate(20,20)">
        <!-- mock legend rows: small swatch + text bars -->
        <rect x="0" y="0" width="14" height="10" fill="#1F1A14"/>
        <rect x="22" y="2" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="20" width="14" height="10" fill="#B8553F"/>
        <rect x="22" y="22" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="40" width="14" height="10" fill="#527A3D"/>
        <rect x="22" y="42" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="60" width="14" height="10" fill="#C97D2C"/>
        <rect x="22" y="62" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="80" width="14" height="10" fill="#2E5266"/>
        <rect x="22" y="82" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="100" width="14" height="10" fill="#FFFFFF" stroke="#D9D0BE"/>
        <rect x="22" y="102" width="100" height="6" fill="#D9D0BE"/>
        <rect x="0" y="120" width="14" height="10" fill="#E8C9A8"/>
        <rect x="22" y="122" width="100" height="6" fill="#D9D0BE"/>
      </g>
      <text x="100" y="220" text-anchor="middle" class="ink h2">Page 4</text>
      <rect x="40" y="232" width="120" height="22" rx="11" class="pillMed"/>
      <text x="100" y="248" text-anchor="middle" class="badge" fill="#FFFFFF">Legend · 88%</text>
    </g>
  </g>

  <!-- Override hint -->
  <text x="40" y="420" class="ink2 caption">Click any page to change its role. We'll re-extract.</text>

  <!-- Multi-page assembly -->
  <rect class="surface" x="40" y="440" width="880" height="100" rx="10" stroke-width="1"/>
  <text x="60" y="468" class="ink h2">We joined pages 2 and 3 into a single chart</text>
  <text x="60" y="488" class="ink2 body">Detected 2-cell overlap on the right edge of page 2 / left edge of page 3 · zero conflicts.</text>
  <text x="60" y="508" class="ink2 body">Resulting grid: 80 × 80 cells · 12 colours · 6,394 stitches.</text>

  <!-- Footer actions -->
  <rect class="ghostBtn" x="600" y="580" width="160" height="40" rx="8" stroke-width="1"/>
  <text x="680" y="606" text-anchor="middle" class="ghostBtnTxt">Review each page</text>
  <rect class="btn" x="780" y="580" width="140" height="40" rx="8"/>
  <text x="850" y="606" text-anchor="middle" class="btnText">Skip to review →</text>
</svg>
