<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal A — "Keeper" — Desktop Mockup</title>
<style>
  /* ───── Reset & Tokens ───── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface-hi: #334155;
    --border: #475569; --text: #f1f5f9; --text-dim: #94a3b8;
    --accent: #0d9488; --accent-fg: #ccfbf1;
    --done: #22c55e; --undone: #64748b;
    --radius: 10px;
    --header-h: 48px; --bottom-bar-h: 44px; --rpanel-w: 260px;
  }
  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ───── Header (48px) ───── */
  .header {
    height: var(--header-h); min-height: var(--header-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 16px;
    z-index: 20;
  }
  .header .logo { font-weight: 700; font-size: 1rem; white-space: nowrap; }
  .header .logo span { color: var(--accent); }
  .header nav { display: flex; gap: 4px; }
  .header nav a {
    padding: 6px 14px; border-radius: 6px; text-decoration: none;
    color: var(--text-dim); font-size: 0.85rem; font-weight: 500;
    transition: background .15s;
  }
  .header nav a:hover { background: var(--surface-hi); color: var(--text); }
  .header nav a.active { background: var(--accent); color: var(--accent-fg); }
  .header .spacer { flex: 1; }
  .header .project-name {
    font-size: 0.85rem; color: var(--text-dim);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .header .progress-pill {
    font-size: 0.8rem; font-weight: 600; color: var(--accent);
    background: rgba(13,148,136,.15); border-radius: 12px;
    padding: 3px 10px;
  }
  .header .menu-btn {
    width: 36px; height: 36px; display: grid; place-items: center;
    background: none; border: none; color: var(--text-dim); font-size: 1.2rem;
    border-radius: 8px; cursor: pointer;
  }
  .header .menu-btn:hover { background: var(--surface-hi); }

  /* ───── Main Layout ───── */
  .main {
    flex: 1; display: flex; overflow: hidden;
  }

  /* ───── Canvas Area ───── */
  .canvas-area {
    flex: 1; position: relative; overflow: hidden;
    background: #1a1a2e;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .canvas-viewport {
    position: absolute; inset: 30px; /* room for row/col headers */
    display: grid; place-items: center;
  }
  .canvas-grid {
    width: 400px; height: 400px;
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    grid-template-rows: repeat(20, 1fr);
    gap: 1px;
  }
  .canvas-grid .cell { border-radius: 1px; position: relative; }
  .canvas-grid .cell.done::after {
    content: '×'; position: absolute; inset: 0;
    display: grid; place-items: center;
    color: rgba(255,255,255,.6); font-size: 0.6rem; font-weight: 700;
  }
  /* Row/col headers */
  .row-header, .col-header {
    position: absolute; color: var(--text-dim); font-size: 0.6rem;
    opacity: 0.5;
  }
  .col-header { top: 10px; left: 30px; right: 0; display: flex; }
  .col-header span { flex: 1; text-align: center; }
  .row-header { top: 30px; left: 4px; bottom: 0; display: flex; flex-direction: column; }
  .row-header span { flex: 1; display: grid; place-items: center; }

  /* Crosshair guides */
  .crosshair-h, .crosshair-v {
    position: absolute; background: rgba(13,148,136,.25); pointer-events: none;
  }
  .crosshair-h { left: 30px; right: 0; height: 20px; top: 180px; }
  .crosshair-v { top: 30px; bottom: 0; width: 20px; left: 210px; }

  /* Floating undo */
  .undo-fab {
    position: absolute; bottom: 56px; left: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    color: var(--text-dim); font-size: 0.8rem;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
    cursor: pointer;
  }
  .undo-fab:hover { background: var(--surface-hi); }

  /* ───── Right Panel (260px) ───── */
  .rpanel {
    width: var(--rpanel-w); min-width: var(--rpanel-w);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .rpanel-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .rpanel-header h3 { font-size: 0.85rem; font-weight: 600; }
  .rpanel-header .sort-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 0.75rem; cursor: pointer;
  }
  .rpanel-body {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }
  .colour-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; cursor: pointer;
    transition: background .1s;
  }
  .colour-row:hover { background: var(--surface-hi); }
  .colour-row.active { background: rgba(13,148,136,.15); border-left: 3px solid var(--accent); }
  .colour-row .swatch {
    width: 22px; height: 22px; border-radius: 4px;
    border: 2px solid var(--border); flex-shrink: 0;
  }
  .colour-row .label { flex: 1; min-width: 0; }
  .colour-row .label .id { font-weight: 600; font-size: 0.8rem; }
  .colour-row .label .name {
    font-size: 0.7rem; color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .colour-row .progress {
    text-align: right; flex-shrink: 0; white-space: nowrap;
  }
  .colour-row .progress .pct { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
  .colour-row .progress .count { font-size: 0.65rem; color: var(--text-dim); }
  .colour-row .done-tag { color: var(--done); font-size: 0.75rem; font-weight: 600; }

  /* Session card at bottom of rpanel */
  .session-card {
    border-top: 1px solid var(--border); padding: 12px 14px;
  }
  .session-card h4 { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .session-stat {
    display: flex; justify-content: space-between; font-size: 0.8rem;
    margin-bottom: 3px;
  }
  .session-stat .val { font-weight: 600; color: var(--accent); }

  /* ───── Bottom Toolbar (44px) ───── */
  .bottom-bar {
    height: var(--bottom-bar-h); min-height: var(--bottom-bar-h);
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 6px;
    z-index: 20;
  }
  .tb-group {
    display: flex; align-items: center; gap: 2px;
    background: var(--surface-hi); border-radius: 8px; padding: 2px;
  }
  .tb-btn {
    height: 32px; padding: 0 12px; border: none; border-radius: 6px;
    background: transparent; color: var(--text-dim); font-size: 0.8rem;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .tb-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }
  .tb-btn.active { background: var(--accent); color: var(--accent-fg); }
  .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }
  .zoom-group {
    display: flex; align-items: center; gap: 4px; margin-left: auto;
  }
  .zoom-group .zoom-btn {
    width: 28px; height: 28px; display: grid; place-items: center;
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-size: 0.8rem; cursor: pointer;
  }
  .zoom-group .zoom-btn:hover { background: var(--surface-hi); }
  .zoom-group .zoom-label { font-size: 0.75rem; color: var(--text-dim); min-width: 40px; text-align: center; }
  .zoom-group .fit-btn {
    padding: 4px 10px; background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); font-size: 0.75rem; cursor: pointer;
  }
  .zoom-group .fit-btn:hover { background: var(--surface-hi); }

  /* ───── Annotations ───── */
  .annotation {
    position: absolute; font-size: 0.6rem; color: var(--accent);
    background: rgba(13,148,136,.12); border: 1px dashed var(--accent);
    border-radius: 3px; padding: 1px 5px; pointer-events: none;
    white-space: nowrap; z-index: 30;
  }
</style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<div class="header">
  <div class="logo">🧵 <span>Cross Stitch Studio</span></div>
  <nav>
    <a href="#">Create</a>
    <a href="#" class="active">Track</a>
    <a href="#">Stash</a>
  </nav>
  <div class="spacer"></div>
  <div class="project-name">My Rose Garden · 80×80</div>
  <div class="progress-pill">23.4%</div>
  <button class="menu-btn" title="File & more" aria-label="File menu">⋯</button>
</div>

<!-- ═══════ MAIN LAYOUT ═══════ -->
<div class="main">

  <!-- ── Canvas Area ── -->
  <div class="canvas-area">
    <!-- Col headers -->
    <div class="col-header" id="colH"></div>
    <!-- Row headers -->
    <div class="row-header" id="rowH"></div>
    <!-- Crosshair guides -->
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <!-- Grid -->
    <div class="canvas-viewport">
      <div class="canvas-grid" id="grid"></div>
    </div>
    <!-- Floating undo -->
    <div class="undo-fab">↩ Undo <span style="color:var(--text-dim);font-size:.7rem">&nbsp;Ctrl+Z</span></div>
    <!-- Annotations -->
    <div class="annotation" style="top: 6px; right: 10px;">
      Colour legend panel → right
    </div>
    <div class="annotation" style="bottom: 50px; left: 50%; transform: translateX(-50%);">
      Bottom toolbar replaces pill row — saves 1 layer of chrome
    </div>
  </div>

  <!-- ── Right Panel: Colour Legend ── -->
  <div class="rpanel">
    <div class="rpanel-header">
      <h3>Colours</h3>
      <button class="sort-btn">Sort: by progress ▾</button>
    </div>
    <div class="rpanel-body" id="colourList"></div>
    <div class="session-card">
      <h4>Session</h4>
      <div class="session-stat"><span>Time</span><span class="val">15m 32s</span></div>
      <div class="session-stat"><span>Stitches</span><span class="val">42</span></div>
      <div class="session-stat"><span>Speed</span><span class="val">2.8 st/min</span></div>
    </div>
  </div>

</div>

<!-- ═══════ BOTTOM TOOLBAR ═══════ -->
<div class="bottom-bar">
  <div class="tb-group">
    <button class="tb-btn" id="btnPan">✋ Pan</button>
    <button class="tb-btn active" id="btnMark">✏️ Mark</button>
    <button class="tb-btn" id="btnRange">⊞ Range</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnHalf" title="Half stitch tools">½ Half ▾</button>
  </div>
  <div class="zoom-group">
    <button class="zoom-btn" aria-label="Zoom out">−</button>
    <span class="zoom-label">120%</span>
    <button class="zoom-btn" aria-label="Zoom in">+</button>
    <button class="fit-btn" aria-label="Fit to screen">Fit</button>
  </div>
</div>

<script>
  // Populate grid
  const grid = document.getElementById('grid');
  const colours = ['#000','#c4190a','#87428a','#3c3c3c','#e8d568','#2e5984','#556b2f','#fff'];
  for (let i = 0; i < 400; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (Math.random() > 0.6 ? ' done' : '');
    cell.style.background = colours[Math.floor(Math.random() * colours.length)];
    if (cell.classList.contains('done')) cell.style.opacity = '0.4';
    grid.appendChild(cell);
  }

  // Col headers
  const colH = document.getElementById('colH');
  for (let i = 1; i <= 20; i++) {
    const s = document.createElement('span');
    s.textContent = i % 5 === 0 ? i : '';
    colH.appendChild(s);
  }
  // Row headers
  const rowH = document.getElementById('rowH');
  for (let i = 1; i <= 20; i++) {
    const s = document.createElement('span');
    s.textContent = i % 5 === 0 ? i : '';
    rowH.appendChild(s);
  }

  // Colour list
  const list = document.getElementById('colourList');
  const palette = [
    { id: '310', name: 'Black', hex: '#000', pct: 73, done: '123/168', active: true },
    { id: '321', name: 'Red', hex: '#c4190a', pct: 37, done: '30/82' },
    { id: '550', name: 'Very Dark Violet', hex: '#87428a', pct: 0, done: '0/23' },
    { id: '3799', name: 'Very Dark Pewter Grey', hex: '#3c3c3c', pct: 53, done: '8/15' },
    { id: '726', name: 'Light Topaz', hex: '#e8d568', pct: 100, done: '14/14' },
    { id: '931', name: 'Medium Antique Blue', hex: '#2e5984', pct: 12, done: '6/50' },
    { id: '469', name: 'Avocado Green', hex: '#556b2f', pct: 8, done: '2/25' },
    { id: 'B5200', name: 'Snow White', hex: '#fff', pct: 45, done: '90/200' },
  ];
  palette.forEach(c => {
    const row = document.createElement('div');
    row.className = 'colour-row' + (c.active ? ' active' : '');
    if (c.pct === 100) {
      row.innerHTML = `
        <div class="swatch" style="background:${c.hex}"></div>
        <div class="label"><div class="id">${c.id}</div><div class="name">${c.name}</div></div>
        <div class="done-tag">✓ Done</div>`;
    } else {
      row.innerHTML = `
        <div class="swatch" style="background:${c.hex}"></div>
        <div class="label"><div class="id">${c.id}</div><div class="name">${c.name}</div></div>
        <div class="progress"><div class="pct">${c.pct}%</div><div class="count">${c.done}</div></div>`;
    }
    list.appendChild(row);
  });

  // Mode switching
  document.querySelectorAll('.tb-group .tb-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.parentElement.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>
</body>
</html>
