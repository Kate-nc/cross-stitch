function rgbToLab(r,g,b){let rr=r/255,gg=g/255,bb=b/255;rr=rr>0.04045?((rr+0.055)/1.055)**2.4:rr/12.92;gg=gg>0.04045?((gg+0.055)/1.055)**2.4:gg/12.92;bb=bb>0.04045?((bb+0.055)/1.055)**2.4:bb/12.92;let x=(rr*0.4124564+gg*0.3575761+bb*0.1804375)/0.95047,y=rr*0.2126729+gg*0.7151522+bb*0.0721750,z=(rr*0.0193339+gg*0.1191920+bb*0.9503041)/1.08883,f=t=>t>0.008856?t**(1/3):(7.787*t)+16/116;return[116*f(y)-16,500*(f(x)-f(y)),200*(f(y)-f(z))];}
function dE(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);}

function findSolid(lab,p){let b=null,bd=1e9;for(let i=0;i<p.length;i++){let d=dE(lab,p[i].lab);if(d<bd){bd=d;b=p[i];}}return{type:"solid",id:b.id,name:b.name,rgb:b.rgb,lab:b.lab,dist:bd};}
function findBest(lab, palette) {
  const solidMatch = findSolid(lab, palette);
  let bestBlend = null;
  let bestBlendDist = 1e9;

  for (let i = 0; i < palette.length; i++) {
    for (let j = i + 1; j < palette.length; j++) {
      const threadA = palette[i];
      const threadB = palette[j];
      const blendLab = [
        (threadA.lab[0] + threadB.lab[0]) / 2,
        (threadA.lab[1] + threadB.lab[1]) / 2,
        (threadA.lab[2] + threadB.lab[2]) / 2
      ];
      const dist = dE(lab, blendLab);

      if (dist < bestBlendDist) {
        bestBlendDist = dist;
        bestBlend = {
          threads: [threadA, threadB],
          lab: blendLab
        };
      }
    }
  }

  if (bestBlend && (bestBlendDist + 3 < solidMatch.dist) && solidMatch.dist > 5) {
    const threadA = bestBlend.threads[0];
    const threadB = bestBlend.threads[1];
    const blendId = threadA.id + "+" + threadB.id;
    const blendRgb = [
      Math.round((threadA.rgb[0] + threadB.rgb[0]) / 2),
      Math.round((threadA.rgb[1] + threadB.rgb[1]) / 2),
      Math.round((threadA.rgb[2] + threadB.rgb[2]) / 2)
    ];

    return {
      type: "blend",
      id: blendId,
      name: blendId,
      rgb: blendRgb,
      lab: bestBlend.lab,
      threads: bestBlend.threads,
      dist: bestBlendDist
    };
  }

  return solidMatch;

function calcDifficulty(palLen,blendCount,totalSt){
  let score=0;
  if(palLen<=8)score+=1;else if(palLen<=15)score+=2;else if(palLen<=25)score+=3;else score+=4;
  if(blendCount>0)score+=1;if(blendCount>5)score+=1;
  if(totalSt>10000)score+=1;if(totalSt>30000)score+=1;
  if(score<=2)return{label:"Beginner",color:"#16a34a",stars:1};
  if(score<=4)return{label:"Intermediate",color:"#d97706",stars:2};
  if(score<=6)return{label:"Advanced",color:"#ea580c",stars:3};
  return{label:"Expert",color:"#dc2626",stars:4};
}

    for(let safe=0;safe<5;safe++){let ids=new Set();for(let i=0;i<mapped.length;i++){let m=mapped[i];if(m.id==="__skip__")continue;if(m.type==="blend"&&m.threads)m.threads.forEach(t=>ids.add(t.id));else ids.add(m.id);}if(ids.size<=maxC)break;let tu={};for(let i=0;i<mapped.length;i++){let m=mapped[i];if(m.id==="__skip__")continue;if(m.type==="blend"&&m.threads)m.threads.forEach(t=>{tu[t.id]=(tu[t.id]||0)+1;});else tu[m.id]=(tu[m.id]||0)+1;}let sorted=Object.entries(tu).sort((a,b)=>b[1]-a[1]);let ks=new Set(sorted.slice(0,maxC).map(e=>e[0]));let kp=p.filter(t=>ks.has(t.id));if(!kp.length)break;for(let i=0;i<mapped.length;i++){let m=mapped[i];if(m.id==="__skip__")continue;let nr=m.type==="blend"&&m.threads?m.threads.some(t=>!ks.has(t.id)):!ks.has(m.id);if(nr)mapped[i]=findSolid(m.lab||rgbToLab(raw[i*4],raw[i*4+1],raw[i*4+2]),kp);}}

    if(m.id!=="__skip__"&&(view==="symbol"||view==="both")&&info&&cSz>=6){let lum=luminance(m.rgb);ctx.fillStyle=dim?"rgba(0,0,0,0.08)":(view==="both"?(lum>128?"#000":"#fff"):"#333");ctx.font=`bold ${Math.max(6,cSz*0.6)}px monospace`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(info.symbol,px+cSz/2,py+cSz/2);}

  if(bsLines.length>0){ctx.strokeStyle="#333";ctx.lineWidth=Math.max(2,cSz*0.15);ctx.lineCap="round";bsLines.forEach(ln=>{let lx1=ln.x1-offX,ly1=ln.y1-offY,lx2=ln.x2-offX,ly2=ln.y2-offY;if(lx1>=0&&lx1<=dW&&ly1>=0&&ly1<=dH&&lx2>=0&&lx2<=dW&&ly2>=0&&ly2<=dH){ctx.beginPath();ctx.moveTo(gut+lx1*cSz,gut+ly1*cSz);ctx.lineTo(gut+lx2*cSz,gut+ly2*cSz);ctx.stroke();}});}
  if(bsStart&&activeTool==="backstitch"){let sx=bsStart.x-offX,sy=bsStart.y-offY;if(sx>=0&&sx<=dW&&sy>=0&&sy<=dH){ctx.fillStyle="rgba(220,50,50,0.8)";ctx.beginPath();ctx.arc(gut+sx*cSz,gut+sy*cSz,Math.max(3,cSz*0.2),0,Math.PI*2);ctx.fill();}}

function drawStitch(ctx,cSz){
  let gut=G,dW=sW,dH=sH;
  ctx.fillStyle="#fff";ctx.fillRect(0,0,gut+dW*cSz+2,gut+dH*cSz+2);

    let idx=y*sW+x,m=pat[idx];if(!m)continue;

      else{ctx.fillStyle=`rgba(${m.rgb[0]},${m.rgb[1]},${m.rgb[2]},0.25)`;ctx.fillRect(px,py,cSz,cSz);if(info&&cSz>=6){ctx.fillStyle="#0f172a";ctx.font=`bold ${Math.max(7,cSz*0.7)}px monospace`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(info.symbol,px+cSz/2,py+cSz/2);}}
    }

  if(showCtr){ctx.strokeStyle="rgba(200,60,60,0.3)";ctx.lineWidth=1.5;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(gut+Math.floor(sW/2)*cSz,gut);ctx.lineTo(gut+Math.floor(sW/2)*cSz,gut+dH*cSz);ctx.stroke();ctx.beginPath();ctx.moveTo(gut,gut+Math.floor(sH/2)*cSz);ctx.lineTo(gut+sW*cSz,gut+Math.floor(sH/2)*cSz);ctx.stroke();ctx.setLineDash([]);}

const renderExport=useCallback(()=>{if(tab!=="export"||!expRef.current||!pat||!cmap)return;let epC=exportPage%pxX,epR=Math.floor(exportPage/pxX),eX0=epC*A4W,eY0=epR*A4H,eW=Math.min(A4W,sW-eX0),eH=Math.min(A4H,sH-eY0),dW2=pageMode?eW:sW,dH2=pageMode?eH:sH,oX2=pageMode?eX0:0,oY2=pageMode?eY0:0,expCs=Math.max(8,Math.min(20,Math.floor(750/Math.max(dW2,dH2))));expRef.current.width=dW2*expCs+G+2;expRef.current.height=dH2*expCs+G+2;drawPattern(expRef.current.getContext("2d"),oX2,oY2,dW2,dH2,expCs,G);},[tab,pat,cmap,sW,sH,pageMode,exportPage,pxX,view,hiId,showCtr,bsLines]);

function handlePatClick(e){
  if(!pcRef.current||!pat)return;
  let gc=gridCoord(pcRef,e,cs,G,activeTool==="backstitch");
  if(!gc)return;let{gx,gy}=gc;
  if((activeTool==="paint"||activeTool==="fill")&&selectedColorId&&cmap){
    if(gx<0||gx>=sW||gy<0||gy>=sH)return;let idx=gy*sW+gx;if(pat[idx].id==="__skip__")return;
    let pe=cmap[selectedColorId];if(!pe)return;let np=pat.slice();
    if(activeTool==="fill"){let ch=[],vis=new Set(),q=[idx],tid=pat[idx].id;if(tid===pe.id)return;while(q.length){let id2=q.pop();if(vis.has(id2))continue;vis.add(id2);if(pat[id2].id!==tid)continue;ch.push({idx:id2,old:{...pat[id2]}});let x2=id2%sW,y2=Math.floor(id2/sW);if(x2>0)q.push(id2-1);if(x2<sW-1)q.push(id2+1);if(y2>0)q.push(id2-sW);if(y2<sH-1)q.push(id2+sW);}if(!ch.length)return;setEditHistory(prev=>[...prev,{type:"fill",changes:ch}]);ch.forEach(c2=>np[c2.idx]={...pe});}
    else{setEditHistory(prev=>[...prev,{type:"paint",changes:[{idx,old:{...pat[idx]}}]}]);np[idx]={...pe};}
    setPat(np);let{pal:np2,cmap:nc}=buildPalette(np);setPal(np2);setCmap(nc);return;
  }
  if(activeTool==="backstitch"){if(gx<0||gx>sW||gy<0||gy>sH)return;let pt={x:gx,y:gy};if(!bsStart)setBsStart(pt);else{setBsLines(prev=>[...prev,{x1:bsStart.x,y1:bsStart.y,x2:pt.x,y2:pt.y}]);setBsStart(null);}}
}

function handleStitchMouseDown(e){
  if(!stitchRef.current||!pat)return;
  // Middle mouse or spacebar+click = pan
  if(e.button===1){e.preventDefault();startPan(e);return;}
  let gc=gridCoord(stitchRef,e,scs,G,stitchMode==="navigate"&&selectedColorId);
  if(!gc)return;let{gx,gy}=gc;
  if(stitchMode==="navigate"){
    if(e.shiftKey||!selectedColorId||!cmap||!cmap[selectedColorId]){
      let gc2=gridCoord(stitchRef,e,scs,G,false);if(gc2&&gc2.gx>=0&&gc2.gx<sW&&gc2.gy>=0&&gc2.gy<sH){setHlRow(gc2.gy);setHlCol(gc2.gx);}
    }else{
      if(gx>=0&&gx<=sW&&gy>=0&&gy<=sH){let existing=parkMarkers.findIndex(m=>m.x===gx&&m.y===gy);if(existing>=0)setParkMarkers(prev=>prev.filter((_,i)=>i!==existing));else setParkMarkers(prev=>[...prev,{x:gx,y:gy,colorId:selectedColorId,rgb:cmap[selectedColorId].rgb}]);}
    }
    return;
  }
  if(gx<0||gx>=sW||gy<0||gy>=sH||!done)return;
  let idx=gy*sW+gx;if(pat[idx].id==="__skip__")return;
  let nv=done[idx]?0:1;setDragVal(nv);setIsDragging(true);
  dragChangesRef.current=[{idx,oldVal:done[idx]}];
  let nd=new Uint8Array(done);nd[idx]=nv;setDone(nd);
  e.preventDefault();
}
function handleStitchMouseMove(e){
  if(isPanning){doPan(e);return;}
  if(!isDragging||stitchMode!=="track"||!done||!stitchRef.current||!pat)return;
  let gc=gridCoord(stitchRef,e,scs,G);if(!gc)return;let{gx,gy}=gc;
  if(gx<0||gx>=sW||gy<0||gy>=sH)return;
  let idx=gy*sW+gx;if(pat[idx].id==="__skip__")return;
  if(done[idx]!==dragVal){
    dragChangesRef.current.push({idx,oldVal:done[idx]});
    let nd=new Uint8Array(done);nd[idx]=dragVal;setDone(nd);
  }
}
function handleMouseUp(){
  if(isPanning){setIsPanning(false);return;}
  if(isDragging&&dragChangesRef.current.length>0){
    pushTrackHistory([...dragChangesRef.current]);
    dragChangesRef.current=[];
  }
  setIsDragging(false);
}

// Pan helpers
function startPan(e){
  if(!stitchScrollRef.current)return;
  setIsPanning(true);
  panStart.current={x:e.clientX,y:e.clientY,scrollX:stitchScrollRef.current.scrollLeft,scrollY:stitchScrollRef.current.scrollTop};
}
function doPan(e){
  if(!stitchScrollRef.current)return;
  let dx=e.clientX-panStart.current.x,dy=e.clientY-panStart.current.y;
  stitchScrollRef.current.scrollLeft=panStart.current.scrollX-dx;
  stitchScrollRef.current.scrollTop=panStart.current.scrollY-dy;
}

// Thread organiser helpers
function toggleOwned(id){setThreadOwned(prev=>{let cur=prev[id]||"";let next=cur===""?"owned":cur==="owned"?"tobuy":"";return{...prev,[id]:next};});}
const ownedCount=useMemo(()=>skeinData.filter(d=>(threadOwned[d.id]||"")==="owned").length,[skeinData,threadOwned]);
const toBuyCount=useMemo(()=>skeinData.filter(d=>(threadOwned[d.id]||"")==="tobuy"||!(threadOwned[d.id])).length,[skeinData,threadOwned]);
const toBuyList=useMemo(()=>skeinData.filter(d=>(threadOwned[d.id]||"")!=="owned"),[skeinData,threadOwned]);

            {stitchMode==="navigate"&&<><div style={{width:1,height:20,background:"#e2e5ea"}}/><span style={{fontSize:11,color:"#64748b"}}>📌</span><select value={selectedColorId||""} onChange={e=>setSelectedColorId(e.target.value||null)} style={{fontSize:11,padding:"3px 6px",borderRadius:6,border:"1px solid #e2e5ea"}}><option value="">No parking</option>{pal.map(p=><option key={p.id} value={p.id}>DMC {p.id}</option>)}</select>{parkMarkers.length>0&&<button onClick={()=>setParkMarkers([])} style={{fontSize:11,padding:"3px 8px",border:"1px solid #fde68a",borderRadius:6,background:"#fffbeb",color:"#d97706",cursor:"pointer"}}>Clear</button>}</>}
            <div style={{marginLeft:"auto",display:"flex",gap:4}}>
              {stitchMode==="track"&&trackHistory.length>0&&<button onClick={undoTrack} style={{fontSize:11,padding:"4px 10px",border:"1px solid #c4b5fd",borderRadius:6,background:"#f5f3ff",color:"#7c3aed",cursor:"pointer"}}>↩ Undo ({trackHistory.length})</button>}
              {done&&doneCount>0&&<button onClick={()=>{if(confirm("Clear all progress?")){setDone(new Uint8Array(pat.length));setTrackHistory([]);}}} style={{fontSize:11,padding:"4px 10px",border:"1px solid #fecaca",borderRadius:6,background:"#fef2f2",color:"#dc2626",cursor:"pointer"}}>Reset</button>}
            </div>
          </div>
          {stitchMode==="track"&&<div style={{fontSize:12,color:"#7c3aed",background:"#faf5ff",padding:"6px 14px",borderRadius:8,marginBottom:6,border:"1px solid #e9d5ff"}}>Click or drag to mark/unmark stitches · Middle-click drag to pan{trackHistory.length>0?` · ${trackHistory.length} undo step${trackHistory.length>1?"s":""} available`:""}</div>}
          {stitchMode==="navigate"&&<div style={{fontSize:12,color:"#2563eb",background:"#eff6ff",padding:"6px 14px",borderRadius:8,marginBottom:6,border:"1px solid #bfdbfe"}}>{selectedColorId?"Click to park. Shift+click to move guide.":"Click to place guide crosshair"}</div>}
          {stitchView==="highlight"&&!focusColour&&<div style={{fontSize:12,color:"#d97706",background:"#fffbeb",padding:"6px 14px",borderRadius:8,marginBottom:6,border:"1px solid #fde68a"}}>Open Colours drawer and tap a colour to highlight</div>}
          <div ref={stitchScrollRef} style={{overflow:"auto",maxHeight:drawer?340:600,border:"1px solid #e2e5ea",borderRadius:"8px 8px 0 0",background:"#f0f2f5",cursor:isPanning?"grabbing":stitchMode==="track"?"crosshair":"default",transition:"max-height 0.3s"}} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}><canvas ref={stitchRef} style={{display:"block"}} onMouseDown={handleStitchMouseDown} onMouseMove={handleStitchMouseMove} onContextMenu={e=>e.preventDefault()}/></div>
          <button onClick={()=>setDrawer(!drawer)} style={{width:"100%",padding:"8px",borderRadius:"0 0 8px 8px",border:"1px solid #e2e5ea",borderTop:"none",background:drawer?"#f8fafc":"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#5b7bb3",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span style={{transform:drawer?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",display:"inline-block"}}>▲</span>Colours ({pal.length}) — {Object.values(colourDoneCounts).filter(c=>c.done>=c.total).length} complete</button>
          {drawer&&<div style={{border:"1px solid #e2e5ea",borderTop:"none",borderRadius:"0 0 10px 10px",background:"#fff",maxHeight:280,overflow:"auto",padding:8}}>
            <div style={{display:"flex",flexDirection:"column",gap:2}}>{pal.map(p=>{let dc=colourDoneCounts[p.id]||{total:0,done:0},pct=dc.total>0?Math.round(dc.done/dc.total*100):0,complete=dc.done>=dc.total,isFocused=focusColour===p.id;
              let sk=skeinEst(p.count,fabricCt);
              return<div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,background:isFocused?"#eff6ff":complete?"#f0fdf4":"#fff",border:isFocused?"2px solid #3b82f6":"1px solid transparent",cursor:"pointer",opacity:complete&&!isFocused?0.6:1}} onClick={()=>{if(stitchView==="highlight")setFocusColour(focusColour===p.id?null:p.id);}}>
                <span style={{width:18,height:18,borderRadius:4,background:`rgb(${p.rgb})`,border:"1px solid #cbd5e1",flexShrink:0}}/>
                <span style={{fontFamily:"monospace",fontSize:13,color:"#1e293b",width:16,textAlign:"center",fontWeight:700}}>{p.symbol}</span>
                <span style={{fontWeight:600,fontSize:12,minWidth:40,color:complete?"#16a34a":"#334155"}}>{p.id}</span>
                <span style={{fontSize:11,color:"#94a3b8",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.type==="blend"?p.threads[0].name+"+"+p.threads[1].name:p.name}</span>
                <span style={{fontSize:10,color:"#94a3b8",flexShrink:0}}>{sk}sk</span>
                <div style={{width:60,height:5,background:"#e2e5ea",borderRadius:3,overflow:"hidden",flexShrink:0}}><div style={{height:"100%",width:pct+"%",background:complete?"#16a34a":"#5b7bb3",borderRadius:3}}/></div>
                <span style={{fontSize:11,color:complete?"#16a34a":"#64748b",fontWeight:complete?600:400,minWidth:50,textAlign:"right"}}>{dc.done}/{dc.total}</span>
                <button onClick={e2=>{e2.stopPropagation();markColourDone(p.id,!complete);}} style={{fontSize:10,padding:"2px 8px",borderRadius:5,border:"1px solid "+(complete?"#fecaca":"#bbf7d0"),background:complete?"#fef2f2":"#f0fdf4",color:complete?"#dc2626":"#16a34a",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{complete?"Undo":"All ✓"}</button>
              </div>;})}</div>
          </div>}
        </div>}

        {/* ═══ PROJECT TAB ═══ */}
        {tab==="project"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Pattern Summary + Difficulty */}
          <Section title="Pattern Summary">
            <div style={{marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px"}}>
              {[["Pattern size",`${sW} × ${sH} stitches`],["Total cells",(sW*sH).toLocaleString()],["Stitchable",totalStitchable.toLocaleString()],["Skipped",(sW*sH-totalStitchable).toLocaleString()],["Colours",`${pal.length} (${blendCount} blend${blendCount!==1?"s":""})`],["Skeins needed",`${totalSkeins} (at ${fabricCt}ct)`]].map(([l,v],i)=><div key={i}><div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>{l}</div><div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{v}</div></div>)}
            </div>
            {difficulty&&<div style={{marginTop:12,padding:"8px 12px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e5ea",display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600}}>Difficulty</div>
              <div style={{display:"flex",gap:2}}>{[1,2,3,4].map(s=><span key={s} style={{fontSize:16,color:s<=difficulty.stars?difficulty.color:"#e2e5ea"}}>★</span>)}</div>
              <span style={{fontSize:13,fontWeight:700,color:difficulty.color}}>{difficulty.label}</span>
              <span style={{fontSize:11,color:"#94a3b8",marginLeft:"auto"}}>{pal.length} colours · {blendCount>0?blendCount+" blends · ":""}{totalStitchable.toLocaleString()} stitches</span>
            </div>}
            {done&&doneCount>0&&<div style={{marginTop:8,padding:"8px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#16a34a"}}>Progress: {progressPct}% — {doneCount.toLocaleString()} of {totalStitchable.toLocaleString()} stitches</div>
            </div>}
          </Section>

          {/* Time Estimate */}
          <Section title="Time Estimate">
            <div style={{marginTop:8}}>
              <SliderRow label="Stitching speed" value={stitchSpeed} min={10} max={120} step={5} onChange={setStitchSpeed} format={v=>v+" stitches/hr"}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px",marginTop:10}}>
                <div><div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>Total estimate</div><div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>{fmtTimeL(Math.round(totalStitchable/stitchSpeed*3600))}</div></div>
                <div><div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>Remaining</div><div style={{fontSize:16,fontWeight:700,color:doneCount>=totalStitchable?"#16a34a":"#5b7bb3"}}>{doneCount>=totalStitchable?"Done!":fmtTimeL(Math.round((totalStitchable-doneCount)/stitchSpeed*3600))}</div></div>
              </div>
              {totalTime>0&&doneCount>0&&<div style={{marginTop:8,padding:"8px 12px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e5ea",fontSize:12,color:"#64748b"}}>
                Based on your actual sessions: {Math.round(doneCount/(totalTime/3600))} stitches/hr average
              </div>}
            </div>
          </Section>

          {/* Finished Size */}
          <Section title="Finished Size">
            <div style={{marginTop:8,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#f8fafc"}}>{["Fabric","Width","Height","With margin"].map((h,i)=><th key={i} style={{padding:"7px 10px",textAlign:"left",borderBottom:"2px solid #e2e5ea",color:"#64748b",fontWeight:600,fontSize:11,textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>
              {[{ct:14,label:"14 count Aida"},{ct:16,label:"16 count Aida"},{ct:18,label:"18 count Aida"},{ct:20,label:"20 count Aida"},{ct:22,label:"22 count Aida"},{ct:25,label:"25 count Evenweave"},{ct:28,label:"28 count Evenweave (over 2)"}].map(f=>{
                let div=f.ct===28?14:f.ct;
                let wIn=sW/div,hIn=sH/div,wCm=(wIn*2.54),hCm=(hIn*2.54);
                let isCurrent=f.ct===fabricCt||(f.ct===28&&fabricCt===28);
                return<tr key={f.ct} style={{borderBottom:"1px solid #f0f2f5",background:isCurrent?"#eff6ff":"transparent"}}><td style={{padding:"6px 10px",fontWeight:isCurrent?700:400}}>{f.label}{isCurrent?" ✓":""}</td><td style={{padding:"6px 10px"}}>{wIn.toFixed(1)}″ / {wCm.toFixed(1)} cm</td><td style={{padding:"6px 10px"}}>{hIn.toFixed(1)}″ / {hCm.toFixed(1)} cm</td><td style={{padding:"6px 10px",fontSize:11,color:"#94a3b8"}}>{(wIn+2).toFixed(0)}″ × {(hIn+2).toFixed(0)}″</td></tr>;})}
            </tbody></table></div>
          </Section>

          {/* Cost Estimate */}
          <Section title="Cost Estimate" defaultOpen={false}>
            <div style={{marginTop:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{fontSize:12,color:"#4a5568"}}>Price per skein (£)</span>
                <input type="number" value={skeinPrice} min={0} step={0.05} onChange={e=>setSkeinPrice(Math.max(0,parseFloat(e.target.value)||0))} style={{width:70,padding:"5px 8px",border:"1px solid #e2e5ea",borderRadius:6,fontSize:13,textAlign:"right"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px"}}>
                <div><div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>Thread cost</div><div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>£{(totalSkeins*skeinPrice).toFixed(2)}</div><div style={{fontSize:11,color:"#94a3b8"}}>{totalSkeins} skeins × £{skeinPrice.toFixed(2)}</div></div>
                {toBuyCount<skeinData.length&&<div><div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>Still to buy</div><div style={{fontSize:16,fontWeight:700,color:"#ea580c"}}>£{(toBuyList.reduce((s,d)=>s+d.skeins,0)*skeinPrice).toFixed(2)}</div><div style={{fontSize:11,color:"#94a3b8"}}>{toBuyList.reduce((s,d)=>s+d.skeins,0)} skeins</div></div>}
              </div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Doesn't include fabric, needles, hoop, or frame. DMC skeins typically £0.85–£1.10 in UK shops.</div>
            </div>
          </Section>

          {/* Thread Organiser / Shopping List */}
          <Section title="Thread Organiser">
            <div style={{marginTop:8,display:"flex",gap:12,marginBottom:10}}>
              <div style={{padding:"6px 14px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0",fontSize:12}}><span style={{fontWeight:700,color:"#16a34a"}}>{ownedCount}</span> <span style={{color:"#64748b"}}>owned</span></div>
              <div style={{padding:"6px 14px",background:"#fff7ed",borderRadius:8,border:"1px solid #fed7aa",fontSize:12}}><span style={{fontWeight:700,color:"#ea580c"}}>{toBuyList.length}</span> <span style={{color:"#64748b"}}>to buy</span></div>
              <div style={{marginLeft:"auto",display:"flex",gap:4}}>
                <button onClick={()=>{let n={};skeinData.forEach(d=>{n[d.id]="owned";});setThreadOwned(n);}} style={{fontSize:11,padding:"4px 10px",border:"1px solid #bbf7d0",borderRadius:6,background:"#f0fdf4",color:"#16a34a",cursor:"pointer"}}>Own all</button>
                <button onClick={()=>setThreadOwned({})} style={{fontSize:11,padding:"4px 10px",border:"1px solid #e2e5ea",borderRadius:6,background:"#fff",color:"#64748b",cursor:"pointer"}}>Clear</button>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:2,maxHeight:320,overflow:"auto"}}>
              {skeinData.map(d=>{
                let st=threadOwned[d.id]||"";
                let isOwned=st==="owned",isToBuy=st==="tobuy"||st==="";
                return<div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:6,background:isOwned?"#f0fdf4":"#fff",border:"1px solid "+(isOwned?"#bbf7d0":"#f0f2f5")}}>
                  <span style={{width:16,height:16,borderRadius:3,background:`rgb(${d.rgb[0]},${d.rgb[1]},${d.rgb[2]})`,border:"1px solid #cbd5e1",flexShrink:0}}/>
                  <span style={{fontWeight:700,fontSize:13,minWidth:44}}>DMC {d.id}</span>
                  <span style={{fontSize:11,color:"#64748b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                  <span style={{fontSize:11,color:"#94a3b8",flexShrink:0}}>{d.skeins}sk</span>
                  <button onClick={()=>toggleOwned(d.id)} style={{fontSize:11,padding:"3px 10px",borderRadius:5,border:"1px solid "+(isOwned?"#bbf7d0":"#fed7aa"),background:isOwned?"#f0fdf4":"#fff7ed",color:isOwned?"#16a34a":"#ea580c",cursor:"pointer",fontWeight:600,minWidth:55,textAlign:"center"}}>{isOwned?"Owned":"To buy"}</button>
                </div>;})}
            </div>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <button onClick={()=>{let txt=toBuyList.map(d=>`DMC ${d.id} ${d.name} × ${d.skeins}`).join("\n");copyText(txt,"shopping");}} style={{padding:"8px 18px",fontSize:13,borderRadius:8,border:"none",background:"#5b7bb3",color:"#fff",cursor:"pointer",fontWeight:600}}>Copy To-Buy List</button>
              <button onClick={()=>{let txt=skeinData.map(d=>`DMC ${d.id} ${d.name} × ${d.skeins}`).join("\n");copyText(txt,"full");}} style={{padding:"8px 18px",fontSize:13,borderRadius:8,border:"1px solid #e2e5ea",background:"#fff",cursor:"pointer",fontWeight:500}}>Copy Full List</button>
            </div>
            {copied&&<div style={{marginTop:6,fontSize:12,color:"#16a34a",fontWeight:600}}>Copied!</div>}
          </Section>
        </div>}

        {/* ═══ LEGEND TAB ═══ */}
        {tab==="legend"&&<div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#64748b"}}>Fabric:</span>
            <select value={fabricCt} onChange={e=>setFabricCt(Number(e.target.value))} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #e2e5ea",fontSize:12,background:"#fff"}}>
              {FABRIC_COUNTS.map(f=><option key={f.ct} value={f.ct}>{f.label}</option>)}
            </select>
            <span style={{fontSize:11,color:"#94a3b8"}}>Total skeins: {totalSkeins}</span>
          </div>
          <div style={{overflow:"auto",maxHeight:540}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#f8fafc"}}>{["Sym","","DMC","Name","Type","Stitches","Skeins",done?"Done":""].filter(Boolean).map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:i>=5?"right":"left",borderBottom:"2px solid #e2e5ea",color:"#64748b",fontWeight:600,fontSize:11,textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>{pal.map((p,i)=>{let dc=colourDoneCounts[p.id]||{total:0,done:0};let sk=skeinEst(p.count,fabricCt);return<tr key={i} onClick={()=>{setHiId(hiId===p.id?null:p.id);setTab("pattern");}} style={{borderBottom:"1px solid #f0f2f5",cursor:"pointer",background:hiId===p.id?"#fff7ed":"transparent"}}><td style={{padding:"6px 10px",fontFamily:"monospace",fontSize:16}}>{p.symbol}</td><td style={{padding:"6px 10px"}}><div style={{width:24,height:24,borderRadius:5,background:`rgb(${p.rgb})`,border:"1px solid #e2e5ea",display:"inline-block"}}/></td><td style={{padding:"6px 10px",fontWeight:600}}>{p.id}</td><td style={{padding:"6px 10px",fontSize:11,color:"#4a5568"}}>{p.type==="blend"?p.threads[0].name+" + "+p.threads[1].name:p.name}</td><td style={{padding:"6px 10px"}}><span style={{padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:600,background:p.type==="blend"?"#fff7ed":"#f0fdf4",color:p.type==="blend"?"#ea580c":"#16a34a"}}>{p.type==="blend"?"Blend":"Solid"}</span></td><td style={{padding:"6px 10px",textAlign:"right"}}>{p.count.toLocaleString()}</td><td style={{padding:"6px 10px",textAlign:"right",fontWeight:600}}>{sk}</td>{done&&<td style={{padding:"6px 10px",textAlign:"right"}}><span style={{color:dc.done>=dc.total?"#16a34a":"#64748b"}}>{dc.done}/{dc.total}</span></td>}</tr>;})}</tbody></table></div>
        </div>}

        {/* ═══ EXPORT TAB ═══ */}
        {tab==="export"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          {copied&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 14px",fontSize:12,color:"#16a34a",fontWeight:600}}>Copied!</div>}
          <Section title="PDF Export"><p style={{fontSize:12,color:"#64748b",margin:"8px 0 10px"}}>Multi-page PDF with legend and chart.</p><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={exportPDF} style={{padding:"10px 20px",fontSize:14,borderRadius:8,border:"none",background:"linear-gradient(135deg,#5b7bb3,#4a6fa5)",color:"#fff",cursor:"pointer",fontWeight:600,boxShadow:"0 2px 8px rgba(74,111,165,0.25)"}}>Download Pattern PDF</button><button onClick={exportCoverSheet} style={{padding:"10px 20px",fontSize:14,borderRadius:8,border:"1.5px solid #5b7bb3",background:"#fff",color:"#5b7bb3",cursor:"pointer",fontWeight:600}}>Cover Sheet PDF</button></div><p style={{fontSize:11,color:"#94a3b8",marginTop:8}}>The cover sheet includes pattern summary, thread list with owned/to-buy status, and space for notes — perfect for tucking into your project bag.</p></Section>
          <Section title="PNG Chart"><div style={{display:"flex",gap:8,alignItems:"center",marginTop:8,marginBottom:8}}><label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={pageMode} onChange={e=>{setPageMode(e.target.checked);setExportPage(0);}}/>A4 pages</label>{pageMode&&<><button onClick={()=>setExportPage(Math.max(0,exportPage-1))} disabled={exportPage===0} style={{fontSize:11,padding:"3px 8px",border:"1px solid #e2e5ea",borderRadius:6,background:"#fff",cursor:"pointer"}}>◀</button><span style={{fontSize:12}}>Page {exportPage+1}/{totPg}</span><button onClick={()=>setExportPage(Math.min(totPg-1,exportPage+1))} disabled={exportPage>=totPg-1} style={{fontSize:11,padding:"3px 8px",border:"1px solid #e2e5ea",borderRadius:6,background:"#fff",cursor:"pointer"}}>▶</button></>}</div><div style={{overflow:"auto",maxHeight:400,border:"1px solid #e2e5ea",borderRadius:8,background:"#fff"}}><canvas ref={expRef} style={{display:"block"}}/></div></Section>
          <Section title="Save / Load"><p style={{fontSize:12,color:"#64748b",margin:"8px 0 10px"}}>Saves everything: progress, parking, thread organiser, sessions.</p><div style={{display:"flex",gap:8}}><button onClick={saveProject} style={{padding:"8px 18px",fontSize:13,borderRadius:8,border:"none",background:"#5b7bb3",color:"#fff",cursor:"pointer",fontWeight:600}}>Save (.json)</button><button onClick={()=>loadRef.current.click()} style={{padding:"8px 18px",fontSize:13,borderRadius:8,border:"1px solid #e2e5ea",background:"#fff",cursor:"pointer",fontWeight:500}}>Load</button></div></Section>
        </div>}
      </div>}
      {!pat&&img&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,color:"#cbd5e1",gap:8}}><div style={{fontSize:40}}>←</div><div style={{fontSize:15,fontWeight:500}}>Adjust settings and click Generate</div></div>}
    </div>
  </div>}
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
