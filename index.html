<!-- UX-12 Phase 7 PR #13: redirect to /home when no project is active.
     Direct URLs and PWA shortcuts continue to work when a project IS active. -->
<script>
(function(){
  try {
    var active = localStorage.getItem('crossstitch_active_project');
    if (!active) {
      var qs = location.search || '';
      var skip = /(\?|&)(from=home|action=)/.test(qs);
      if (!skip) { location.replace('home.html'); return; }
    }
  } catch (_) { /* localStorage blocked → load tool normally */ }
})();
</script>

    var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;

};

/* Cat C perf split: ImportWizard + useImportWizard (~30 KB) live in their

   falls back to the legacy single-step modal if window.ImportWizard isn't
   present, so a slow network won't break the import flow. */
(function maybePreloadImportWizard() {
  try {
    var on = window.UserPrefs && window.UserPrefs.get && window.UserPrefs.get('experimental.importWizard');

    else setTimeout(go, 0);
  } catch (_) {}
})();

  // Clear stale stats cache on tracker version bump

  var cached = null;
  try { cached = localStorage.getItem(TRACKER_CACHE_KEY); } catch(e) {}
  // Wrap in IIFE so const/let declarations don't collide with the inline Babel script

    var s = document.createElement('script'); s.textContent = '(function(){' + cached + '})();'; document.head.appendChild(s); return;

    return r.ok ? r.text() : Promise.reject('fetch failed');

    var compiled = Babel.transform(src, { presets: ['react'], filename: 'tracker-app.js' }).code;

    var s = document.createElement('script'); s.textContent = '(function(){' + compiled + '})();'; document.head.appendChild(s);
  }).catch(function(err) {
    /* file:// or network error — fall back to Babel MutationObserver path */

    var s = document.createElement('script'); s.type = 'text/babel'; s.src = 'tracker-app.js';

  });
};
