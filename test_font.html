<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <script>
    async function testPdf() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      try {
        const response = await fetch('https://fonts.gstatic.com/s/notosans/v36/o-0IIpQlx3QUlC5A4PNr5TRA.woff2'); // Wait, jsPDF only supports TTF out of the box...
        console.log("Response:", response.ok);
      } catch(e) {
        console.error(e);
      }
    }
    testPdf();
  </script>
</body>
</html>
