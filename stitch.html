<!-- Canonical landing is /home (home.html). External links and search
     results should route through the hub so users always pass through the
     project picker. (Homepage-predominance audit, Tier 3 #11.) -->
<link rel="canonical" href="./home.html">
<meta property="og:title" content="Cross Stitch Studio">
<meta property="og:description" content="Design, track, and manage cross-stitch patterns — fully client-side.">
<meta property="og:url" content="./home.html">
<meta property="og:type" content="website">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- UX-12 Phase 7 PR #13: redirect to /home when no project is active.
     Direct URLs and PWA shortcuts continue to work when a project IS active. -->
<script>
(function(){
  try {
    var active = localStorage.getItem('crossstitch_active_project');
    if (!active) {
      var qs = location.search || '';
      var skip = /(\?|&)(from=home|action=)/.test(qs);
      if (!skip) { location.replace('home.html'); return; }
    }
  } catch (_) { /* localStorage blocked → load tool normally */ }
})();
</script>

<!-- pdf.js + pdf-importer are lazy-loaded on first PDF import -->
<script>
window.loadScript = function(src) {
  if (document.querySelector('script[src="' + src + '"]')) return Promise.resolve();
  return new Promise(function(res, rej) { var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
};
window.loadPdfStack = function() {
  return window.loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js')
    .then(function() { if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js'; return window.loadScript('pdf-importer.js'); });
};
</script>
