<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';">
<title>Stitch Tracker</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<!-- pdf.js + pdf-importer are lazy-loaded on first PDF import -->
<script>
window.loadScript = function(src) {
  if (document.querySelector('script[src="' + src + '"]')) return Promise.resolve();
  return new Promise(function(res, rej) { var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
};
window.loadPdfStack = function() {
  return window.loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js')
    .then(function() { if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js'; return window.loadScript('pdf-importer.js'); });
};
</script>
<link rel="stylesheet" href="styles.css">
<script src="constants.js"></script>
<script src="dmc-data.js"></script>
<script src="colour-utils.js"></script>
<script src="helpers.js"></script>
<script src="import-formats.js"></script>
<script src="components.js"></script>
<script src="header.js"></script>
<script src="modals.js"></script>
<script src="threadCalc.js"></script>
<script src="project-storage.js"></script>
<script src="stash-bridge.js"></script>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#71717a;font-family:system-ui,sans-serif;font-size:14px"><div style="width:28px;height:28px;border:2.5px solid #e4e4e7;border-top-color:#0d9488;border-radius:50%;animation:ld-spin 0.8s linear infinite"></div><span id="ld-msg">Loading…</span></div><style>@keyframes ld-spin{to{transform:rotate(360deg)}}</style></div>
<script>
/* Compile tracker-app.js via Babel and cache the result in localStorage.
   On repeat visits the cached JS is injected directly — no re-compilation needed.
   Self-healing: if cached code fails (stale/corrupt), auto-clears and recompiles. */
(function(){
  var CACHE_KEY='babel_tracker_v4';
  function inject(code){var s=document.createElement('script');s.textContent=code;document.head.appendChild(s);}
  function setMsg(t){var el=document.getElementById('ld-msg');if(el)el.textContent=t;}
  function showError(msg){
    setMsg(msg||'Failed to load tracker.');
    var root=document.getElementById('root');
    if(root){var btn=document.createElement('button');btn.textContent='Retry';btn.style.cssText='margin-top:12px;padding:6px 18px;border-radius:6px;border:1px solid #d4d4d8;background:#fff;cursor:pointer;font-size:14px';
    btn.onclick=function(){try{localStorage.removeItem(CACHE_KEY);}catch(e){}location.reload();};root.appendChild(btn);}
  }
  function compile(){
    setMsg('Compiling (first launch only)…');
    fetch('tracker-app.js').then(function(r){return r.ok?r.text():Promise.reject('fetch '+r.status);})
    .then(function(src){return new Promise(function(res){setTimeout(function(){res(src);},50);});})
    .then(function(src){
      var compiled=Babel.transform(src,{presets:['react'],filename:'tracker-app.js'}).code;
      try{localStorage.setItem(CACHE_KEY,compiled);}catch(e){}
      inject(compiled);
      if(typeof window.TrackerApp==='undefined') showError('Tracker failed to initialize.');
    }).catch(function(err){console.error('[Stitch] compile error:',err);showError('Failed to compile tracker.');});
  }
  /* Try cached code first */
  var cached;try{cached=localStorage.getItem(CACHE_KEY);}catch(e){}
  if(cached){
    inject(cached);
    if(typeof window.TrackerApp!=='undefined') return; /* cache hit success */
    /* Cache is stale or corrupt — clear and recompile */
    console.warn('[Stitch] cached code failed, clearing and recompiling…');
    try{localStorage.removeItem(CACHE_KEY);}catch(e){}
  }
  compile();
})();
</script>
</body>
</html>
