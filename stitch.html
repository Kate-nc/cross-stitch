<!-- Canonical landing is /home (home.html). External links and search

<!-- UX-12 Phase 7 PR #13: redirect to /home when no project is active.
     Direct URLs and PWA shortcuts continue to work when a project IS active. -->
<script>
(function(){
  try {
    var active = localStorage.getItem('crossstitch_active_project');
    if (!active) {
      var qs = location.search || '';
      var skip = /(\?|&)(from=home|action=)/.test(qs);
      if (!skip) { location.replace('home.html'); return; }
    }
  } catch (_) { /* localStorage blocked → load tool normally */ }
})();
</script>

<!-- pdf.js + pdf-importer are lazy-loaded on first PDF import -->
<script>
window.loadScript = function(src, opts) {
  if (document.querySelector('script[src="' + src + '"]')) return Promise.resolve();
  opts = opts || {};
  return new Promise(function(res, rej) {
    var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;
    if (opts.integrity) { s.integrity = opts.integrity; s.crossOrigin = opts.crossOrigin || 'anonymous'; s.referrerPolicy = 'no-referrer'; }
    document.head.appendChild(s);
  });
};
window.loadPdfStack = function() {
  return window.loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js', { integrity: 'sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e' })
    .then(function() { if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js'; return window.loadScript('pdf-importer.js'); });
};
</script>

<!-- Cat C perf split: conditionally preload the ImportWizard bundle only
     when the experimental flag is on. Default users never fetch the 30 KB.
     The wizard branch in tracker-app.js already falls back to the legacy
     modal if window.ImportWizard isn't present. -->
<script>
(function maybePreloadImportWizard() {
  try {
    var on = window.UserPrefs && window.UserPrefs.get && window.UserPrefs.get('experimental.importWizard');
    if (!on) return;
    var go = function () {
      if (document.querySelector('script[src="creator/import-wizard-bundle.js"]')) return;
      var s = document.createElement('script');
      s.src = 'creator/import-wizard-bundle.js';
      document.head.appendChild(s);
    };
    if (typeof requestIdleCallback === 'function') requestIdleCallback(go, { timeout: 2000 });
    else setTimeout(go, 0);
  } catch (_) {}
})();
</script>
